  <style>/* ═══════════════════════════════════════════════════
   ProofGPT — Refined Chat UI
   Inspired by Claude / ChatGPT flow
   ═══════════════════════════════════════════════════ */

:root {
  /* Base */
  --bg:          #0f1117;
  --bg-surface:  #161b27;
  --bg-card:     #1c2235;
  --bg-input:    #1a1f2e;
  --bg-hover:    #222840;
  --bg-active:   #252c42;

  /* Borders */
  --border:      rgba(255,255,255,0.06);
  --border-md:   rgba(255,255,255,0.10);
  --border-hi:   rgba(255,255,255,0.16);

  /* Text */
  --tx-1:  #e9e8e3;
  --tx-2:  #9098b0;
  --tx-3:  #545d76;
  --tx-4:  #363d55;

  /* Accent — warm gold */
  --ac:        #d4af6a;
  --ac-dim:    rgba(212,175,106,0.12);
  --ac-glow:   rgba(212,175,106,0.06);

  /* Status */
  --green: #5cb85c;
  --red:   #e05c5c;

  /* Typography */
  --serif: 'Instrument Serif', Georgia, serif;
  --sans:  'Geist', system-ui, sans-serif;
  --mono:  'Geist Mono', 'Courier New', monospace;

  /* Layout */
  --sidebar-w: 252px;
  --topbar-h:  52px;
  --radius:    10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

/* ── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--tx-1); font-family: var(--sans); font-size: 15px; line-height: 1.6; overflow: hidden; }

/* ── Layout ─────────────────────────────────────── */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-top {
  padding: 18px 14px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 2px;
}

.brand-icon {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ac);
  line-height: 1;
}

.brand-name {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--tx-1);
  letter-spacing: -0.02em;
}

.new-chat-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}

.new-chat-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-hi);
  color: var(--tx-1);
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx-3);
  padding: 14px 16px 6px;
}

/* Format toggle */
.format-toggle {
  display: flex;
  gap: 4px;
  padding: 0 14px 10px;
}

.fmt-btn {
  flex: 1;
  padding: 7px 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--tx-3);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.fmt-btn:hover { border-color: var(--border-md); color: var(--tx-2); }

.fmt-btn.active {
  background: var(--ac-dim);
  border-color: rgba(212,175,106,0.3);
  color: var(--ac);
}

/* Proof index */
.proof-index {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.proof-index::-webkit-scrollbar { width: 3px; }
.proof-index::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.idx-item, .idx-group {
  display: block;
  width: 100%;
  background: none;
  border: none;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12.5px;
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: background 0.12s, color 0.12s;
}

.idx-item:hover { background: var(--bg-hover); color: var(--tx-1); }
.idx-item .num { font-family: var(--mono); font-size: 10.5px; color: var(--ac); margin-right: 6px; }

.idx-group-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--tx-4);
  padding: 10px 8px 4px;
}

/* Sidebar bottom */
.sidebar-bottom {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11.5px;
  color: var(--tx-3);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 5px var(--green);
}

/* ── Main area ───────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Topbar ──────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--tx-3);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  transition: color 0.15s;
}

.hamburger:hover { color: var(--tx-1); }

.topbar-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--tx-2);
  flex: 1;
}

.topbar-link {
  font-size: 12.5px;
  color: var(--tx-3);
  text-decoration: none;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}

.topbar-link:hover { color: var(--tx-2); border-color: var(--border-md); }

/* ── Thread (chat scroll area) ───────────────────── */
.thread {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.thread::-webkit-scrollbar { width: 4px; }
.thread::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.thread-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Message ─────────────────────────────────────── */
.msg {
  display: flex;
  gap: 14px;
  padding: 18px 0;
  animation: msgIn 0.22s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* No visual separator between messages — just space */
.msg + .msg {
  border-top: 1px solid var(--border);
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  margin-top: 1px;
}

.msg.user .msg-avatar {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  color: var(--tx-2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.msg.assistant .msg-avatar {
  background: var(--ac-dim);
  border: 1px solid rgba(212,175,106,0.2);
  color: var(--ac);
  font-family: var(--serif);
  font-size: 15px;
}

.msg-content {
  flex: 1;
  min-width: 0;
  padding-top: 3px;
}

.msg-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--tx-3);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.msg-body {
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--tx-1);
}

.msg-body p { margin-bottom: 0.65em; }
.msg-body p:last-child { margin-bottom: 0; }

/* User message body slightly different */
.msg.user .msg-body {
  color: var(--tx-2);
  font-size: 14px;
}

/* ── Typing indicator ────────────────────────────── */
.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 4px 0;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--tx-3);
  border-radius: 50%;
  animation: typingBounce 1.3s infinite ease-in-out;
}

.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── Proof card ──────────────────────────────────── */
.proof-card {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 12px;
}

.proof-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-active);
}

.proof-card-title {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--tx-1);
}

.proof-card-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ac);
  background: var(--ac-dim);
  border: 1px solid rgba(212,175,106,0.2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* Proof sections */
.proof-section {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.proof-section:last-child { border-bottom: none; }

.proof-section-lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.proof-conditional {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--tx-1);
  line-height: 1.65;
  padding: 10px 14px;
  background: var(--ac-glow);
  border-left: 2px solid var(--ac);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.proof-given {
  font-size: 13.5px;
  color: var(--tx-2);
  line-height: 1.7;
}

.proof-given li { list-style: none; padding: 2px 0; }
.proof-given li::before { content: "·"; color: var(--ac); margin-right: 8px; }

/* Diagram */
.proof-diagram-wrap {
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 18px;
  display: flex;
  justify-content: center;
}

.proof-diagram-wrap svg { max-width: 100%; height: auto; }

/* Two-column table */
.proof-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.proof-table th {
  padding: 7px 12px;
  text-align: left;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx-3);
  border-bottom: 1px solid var(--border);
}

.proof-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.55;
}

.proof-table tr:last-child td { border-bottom: none; }

.proof-table td:first-child { width: 30px; color: var(--tx-4); font-size: 11px; }
.proof-table td:nth-child(2) { font-family: var(--mono); font-size: 12px; color: var(--tx-1); }
.proof-table td:last-child { color: var(--tx-2); font-size: 12px; }

/* Paragraph proof */
.proof-para {
  font-size: 14px;
  line-height: 1.85;
  color: var(--tx-1);
}

.proof-para p { margin-bottom: 0.7em; }

/* Explanation box */
.proof-explanation {
  font-size: 13.5px;
  color: var(--tx-2);
  line-height: 1.75;
}

/* ── Welcome card ────────────────────────────────── */
.welcome-card {
  padding: 6px 0 16px;
}

.welcome-greeting {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--tx-1);
  margin-bottom: 8px;
}

.welcome-sub {
  font-size: 14px;
  color: var(--tx-2);
  line-height: 1.7;
  margin-bottom: 16px;
}

.welcome-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.hint-chip {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12.5px;
  padding: 6px 13px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.hint-chip:hover {
  background: var(--bg-hover);
  border-color: var(--ac);
  color: var(--ac);
}

/* ── All theorems browser ────────────────────────── */
.theorem-browser { display: flex; flex-direction: column; gap: 18px; margin-top: 8px; }

.chapter-group { }

.chapter-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.chapter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.theorem-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}

.theorem-chip:hover {
  border-color: var(--ac);
  color: var(--ac);
  background: var(--ac-dim);
}

.theorem-chip .tnum {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ac);
  opacity: 0.8;
}

/* ── Fuzzy warning ───────────────────────────────── */
.fuzzy-banner {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 12.5px;
  color: var(--tx-2);
  background: rgba(212,175,106,0.07);
  border: 1px solid rgba(212,175,106,0.18);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 12px;
  line-height: 1.6;
}

.alts-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 5px;
}

/* ── Composer ────────────────────────────────────── */
.composer-wrap {
  padding: 12px 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.composer {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  padding: 10px 10px 10px 16px;
  transition: border-color 0.15s;
}

.composer:focus-within {
  border-color: rgba(212,175,106,0.4);
}

.composer-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--tx-1);
  font-family: var(--sans);
  font-size: 14.5px;
  line-height: 1.6;
  resize: none;
  max-height: 160px;
  padding: 2px 0;
}

.composer-input::placeholder { color: var(--tx-4); }

.composer-send {
  width: 34px;
  height: 34px;
  background: var(--ac);
  border: none;
  border-radius: 8px;
  color: #0f1117;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}

.composer-send:hover { opacity: 0.88; transform: translateY(-1px); }
.composer-send:active { transform: translateY(0); }
.composer-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.composer-hints {
  max-width: 720px;
  margin: 8px auto 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ── Builder page ────────────────────────────────── */
.builder-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.builder-search {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.search-row {
  max-width: 720px;
  display: flex;
  gap: 10px;
}

.search-input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: var(--radius);
  color: var(--tx-1);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 16px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: rgba(212,175,106,0.4); }
.search-input::placeholder { color: var(--tx-4); }

.search-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 11px 18px;
  background: var(--ac);
  border: none;
  border-radius: var(--radius);
  color: #0f1117;
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}

.search-btn:hover { opacity: 0.9; }

.builder-result {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.builder-result::-webkit-scrollbar { width: 4px; }
.builder-result::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.builder-empty {
  max-width: 480px;
  margin: 60px auto;
  text-align: center;
}

.builder-empty-icon {
  font-family: var(--serif);
  font-size: 48px;
  color: var(--border-hi);
  margin-bottom: 18px;
}

.builder-empty p {
  font-size: 14px;
  color: var(--tx-3);
  line-height: 1.7;
  margin-bottom: 6px;
}

.builder-count { font-size: 12.5px !important; color: var(--tx-4) !important; }

/* Full proof layout (builder page) */
.full-proof-wrap { max-width: 720px; }

.full-proof-header {
  margin-bottom: 20px;
}

.full-proof-title {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--tx-1);
  margin-bottom: 4px;
  line-height: 1.25;
}

.full-proof-meta {
  font-size: 12px;
  color: var(--tx-3);
}

.full-proof-section {
  margin-bottom: 20px;
}

.full-proof-section-lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.no-result {
  max-width: 480px;
  margin: 40px auto;
  text-align: center;
  color: var(--tx-3);
  font-size: 14px;
  line-height: 1.8;
}

.no-result strong { color: var(--tx-2); }
.no-result code {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);

  dCircumcenter(){

// ── Safe arithmetic evaluator ────────────────────────────────────
const MathEval = {

  // Evaluate a safe arithmetic/math expression
  evaluate(expr) {
    // Clean up input
    let e = expr.trim()
      .replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**')
      .replace(/\bpi\b/gi, 'Math.PI').replace(/\bπ\b/g, 'Math.PI')
      .replace(/\be\b/g, 'Math.E')
      .replace(/\bsqrt\b/gi, 'Math.sqrt').replace(/√(\d+)/g, 'Math.sqrt($1)')
      .replace(/\babs\b/gi, 'Math.abs')
      .replace(/\bsin\b/gi, 'Math.sin').replace(/\bcos\b/gi, 'Math.cos')
      .replace(/\btan\b/gi, 'Math.tan').replace(/\blog\b/gi, 'Math.log10')
      .replace(/\bln\b/gi, 'Math.log').replace(/\bfloor\b/gi, 'Math.floor')
      .replace(/\bceil\b/gi, 'Math.ceil').replace(/\bround\b/gi, 'Math.round')
      .replace(/\bpow\b/gi, 'Math.pow');

    // Only allow safe characters
    if (!/^[\d\s\+\-\*\/\.\(\)\%\!Math\.PIEA-Za-z_]+$/.test(e)) return null;
    if (/\b(window|document|eval|Function|fetch|import|require|process)\b/.test(e)) return null;

    try {
      const result = Function('"use strict"; return (' + e + ')')();
      if (typeof result !== 'number' || !isFinite(result)) return null;
      // Format nicely
      if (Number.isInteger(result)) return result.toString();
      const rounded = Math.round(result * 1e10) / 1e10;
      return rounded.toString();
    } catch { return null; }
  },

  // Check if a string looks like a math expression to evaluate
  isExpression(q) {
    // Has operators and numbers, looks computational
    if (!/\b(what|how|why|explain|tell|show|describe|define)\b/i.test(q)) {
      // Direct operators
      if (/[\d].*[\+\-\*\/\^]|[\+\-\*\/\^].*[\d]/.test(q) && /\d/.test(q)) return true;
      // Math functions applied to numbers
      if (/\b(sqrt|abs|sin|cos|tan|log|ln|floor|ceil|round)\s*\(?\d/.test(q)) return true;
      // √ symbol
      if (/√\d/.test(q)) return true;
    }
    return false;
  },

  // Format the answer with step-by-step for simple operations
  formatAnswer(expr, result, original) {
    const ops = {
      add: /(\d[\d\s]*)\s*\+\s*([\d\s]*\d)/,
      sub: /(\d[\d\s]*)\s*-\s*([\d\s]*\d)/,
      mul: /(\d[\d\s]*)\s*[\*×]\s*([\d\s]*\d)/,
      div: /(\d[\d\s]*)\s*[\/÷]\s*([\d\s]*\d)/,
      pow: /(\d[\d\s]*)\s*[\*\*\^]\s*([\d\s]*\d)/,
    };

    const clean = original.replace(/\s+/g, ' ').trim();
    return `<div class="math-answer">
      <div class="math-expr">${escHtml(clean)} = <span class="math-result">${escHtml(result)}</span></div>
    </div>`;
  }
};

const MathBrain = {

  // Score a concept against a query
  scoreConcept(concept, q) {
    const ql = q.toLowerCase();
    let score = 0;
    for (const kw of concept.keywords) {
      if (ql === kw) score += 100;
      else if (ql.includes(kw)) score += kw.length * 4;
      else if (kw.includes(ql) && ql.length > 3) score += 20;
      else {
        const kwWords = kw.split(/\s+/);
        const qWords = ql.split(/\s+/).filter(w => w.length > 2);
        for (const qw of qWords) {
          for (const kw2 of kwWords) {
            if (kw2.includes(qw) || qw.includes(kw2)) score += 8;
          }
        }
      }
    }
    return score;
  },

  // Find best matching concept
  findConcept(query) {
    let best = null, bestScore = 0;
    for (const c of MATH_CONCEPTS) {
      const s = this.scoreConcept(c, query);
      if (s > bestScore) { bestScore = s; best = c; }
    }
    return bestScore >= 12 ? { concept: best, score: bestScore } : null;
  },

  // Try to compute arithmetic
  tryCompute(query) {
    // Strip trailing punctuation and question words
    const clean = query
      .replace(/[?!.]+$/, '')
      .replace(/^(what\s+is|calculate|compute|evaluate|solve|find|what'?s)\s+/i, '')
      .replace(/\s*=\s*\??\s*$/, '')
      .trim();

    if (MathEval.isExpression(clean)) {
      const result = MathEval.evaluate(clean);
      if (result !== null) return { expr: clean, result };
    }
    return null;
  },

  // Build the response HTML for a concept
  buildConceptCard(concept) {
    return `<div class="math-card">
      <div class="math-card-head">
        <span class="math-card-title">${concept.title}</span>
        <span class="math-card-badge">${concept.tags[0]}</span>
      </div>
      <div class="math-card-body">
        ${concept.explain()}
      </div>
    </div>`;
  },

  // Build arithmetic answer card
  buildArithmeticCard(expr, result) {
    // Generate step-by-step for simple ops if possible
    const steps = this.getSteps(expr, result);
    return `<div class="math-card">
      <div class="math-card-head">
        <span class="math-card-title">Calculation</span>
        <span class="math-card-badge">arithmetic</span>
      </div>
      <div class="math-card-body">
        <div class="math-answer-big">
          <span class="math-expr-text">${escHtml(expr)}</span>
          <span class="math-equals"> = </span>
          <span class="math-result-big">${escHtml(result)}</span>
        </div>
        ${steps ? `<div class="math-steps">${steps}</div>` : ''}
      </div>
    </div>`;
  },

  getSteps(expr, result) {
    const e = expr.replace(/\s+/g,'');
    // Simple single operation
    const add = e.match(/^(-?\d+(?:\.\d+)?)\+(-?\d+(?:\.\d+)?)$/);
    const sub = e.match(/^(-?\d+(?:\.\d+)?)-(-?\d+(?:\.\d+)?)$/);
    const mul = e.match(/^(-?\d+(?:\.\d+)?)\*(-?\d+(?:\.\d+)?)$/);
    const div = e.match(/^(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)$/);
    const pow = e.match(/^(-?\d+(?:\.\d+)?)\*\*(-?\d+(?:\.\d+)?)$/);

    if (add) return `<p class="math-step">Adding ${add[1]} and ${add[2]}: ${add[1]} + ${add[2]} = <strong>${result}</strong></p>`;
    if (sub) return `<p class="math-step">Subtracting ${sub[2]} from ${sub[1]}: ${sub[1]} − ${sub[2]} = <strong>${result}</strong></p>`;
    if (mul) return `<p class="math-step">Multiplying ${mul[1]} × ${mul[2]} = <strong>${result}</strong></p>`;
    if (div) {
      const n = parseFloat(div[1]), d = parseFloat(div[2]);
      return `<p class="math-step">${n} ÷ ${d} = <strong>${result}</strong>${Number.isInteger(n/d) ? '' : ` ≈ ${(n/d).toFixed(4)}`}</p>`;
    }
    if (pow) return `<p class="math-step">${pow[1]} raised to the power ${pow[2]} = <strong>${result}</strong></p>`;

    // Multi-step PEMDAS breakdown
    return `<p class="math-step">Evaluated using order of operations (PEMDAS): <strong>${result}</strong></p>`;
  },

  // Is this query math-related at all?
  isMathQuery(q) {
    const ql = q.toLowerCase();
    const mathWords = ['math', 'calculate', 'compute', 'solve', 'equation', 'formula',
      'number', 'algebra', 'calculus', 'trig', 'log', 'sin', 'cos', 'tan',
      'derivative', 'integral', 'limit', 'function', 'graph', 'slope', 'intercept',
      'quadratic', 'parabola', 'exponent', 'fraction', 'percent', 'prime', 'factor',
      'probability', 'statistic', 'mean', 'median', 'sequence', 'series', 'imaginary',
      'pythagorean', 'hypotenuse', '1+1', 'plus', 'minus', 'times', 'divided',
      'squared', 'cubed', 'root', 'absolute value', 'inequality', 'variable'];
    return mathWords.some(w => ql.includes(w)) ||
           /[\d]/.test(q) && /[\+\-\*\/\^\%]/.test(q);
  }
};

// ── Conversational question detector ─────────────────────────────
// Detects "what is X", "is X a Y", "are all X Y" style questions
// that should go to the concept brain, never a proof card
MathBrain.isConversationalQuestion = function(q) {
  const ql = q.toLowerCase().trim();
  return (
    /^(what is|what are|what's|whats)\b/.test(ql) ||
    /^(is (a|an|the)|are (all|some|any)|can (a|an))\b/.test(ql) ||
    /^(how does|how do|how is|how are)\b/.test(ql) ||
    /^(why is|why are|why does)\b/.test(ql) ||
    /^(difference between|what's the difference|compare)\b/.test(ql) ||
    /^(explain|define|tell me about|describe)\b/.test(ql) ||
    /\b(work|works|mean|means|defined as|definition of)\??$/.test(ql)
  );
};

// INHERITANCE[A][B] = 'always'|'sometimes'|'never'
const IS_A = {
  square:      { rectangle: 'always', rhombus: 'always', parallelogram: 'always', quadrilateral: 'always', polygon: 'always' },
  rectangle:   { parallelogram: 'always', quadrilateral: 'always', polygon: 'always', square: 'sometimes', rhombus: 'sometimes' },
  rhombus:     { parallelogram: 'always', quadrilateral: 'always', polygon: 'always', square: 'sometimes', rectangle: 'sometimes' },
  parallelogram: { quadrilateral: 'always', polygon: 'always', rectangle: 'sometimes', rhombus: 'sometimes', square: 'sometimes', trapezoid: 'never' },
  trapezoid:   { quadrilateral: 'always', polygon: 'always', parallelogram: 'never', rectangle: 'never', rhombus: 'never', square: 'never' },
  kite:        { quadrilateral: 'always', polygon: 'always', rhombus: 'sometimes', square: 'sometimes' },
  isoscelesTrapezoid: { trapezoid: 'always', quadrilateral: 'always', polygon: 'always' },
  equilateral: { isosceles: 'always', triangle: 'always', polygon: 'always', acute: 'always' },
  isosceles:   { triangle: 'always', polygon: 'always', equilateral: 'sometimes' },
  scalene:     { triangle: 'always', polygon: 'always', equilateral: 'never', isosceles: 'never' },
  triangle:    { polygon: 'always' },
  pentagon:    { polygon: 'always' },
  hexagon:     { polygon: 'always' },
  octagon:     { polygon: 'always' },
};

// Property ownership
const HAS_PROP = {
  'all angles 90':     ['square','rectangle'],
  'equal sides':       ['square','rhombus','equilateral'],
  'parallel sides':    ['parallelogram','rectangle','rhombus','square','trapezoid','isoscelesTrapezoid'],
  'diagonals equal':   ['square','rectangle','isoscelesTrapezoid'],
  'diagonals perp':    ['square','rhombus','kite'],
  'diagonals bisect':  ['parallelogram','rectangle','rhombus','square'],
  'base angles equal': ['isosceles','isoscelesTrapezoid'],
};


// ── Query intent parser ──────────────────────────────────────────
const Reasoner = {

  // Normalize shape names from user input
  normalizeShape(word) {
    const map = {
      'squares':'square','rectangles':'rectangle','rhombuses':'rhombus','rhombi':'rhombus',
      'parallelograms':'parallelogram','trapezoids':'trapezoid','trapeziums':'trapezoid',
      'kites':'kite','triangles':'triangle','quadrilaterals':'quadrilateral',
      'polygons':'polygon','pentagons':'pentagon','hexagons':'hexagon','octagons':'octagon',
      'circles':'circle','equilaterals':'equilateral','isosceles':'isosceles',
      'scalenes':'scalene',
      // handle "isosceles trapezoid" as compound
      'isosceles trapezoid':'isoscelesTrapezoid',
      'isosceles trapezoids':'isoscelesTrapezoid',
    };
    const w = word.toLowerCase().trim();
    // Check full phrase first
    if (map[w]) return map[w];
    if (SHAPES[w]) return w;
    // Check each successive shorter prefix (for "equilateral triangle" type inputs)
    const parts = w.split(/\s+/);
    for (let i = parts.length; i >= 1; i--) {
      const phrase = parts.slice(0, i).join(' ');
      if (map[phrase]) return map[phrase];
      if (SHAPES[phrase]) return phrase;
    }
    return null;
  },

  // Parse intent from a query string
  parseIntent(query) {
    const q = query.toLowerCase().trim().replace(/[?!.]+$/, '');

    // ── IS-A questions: "is a square a rectangle?" ──────
    const isAPatterns = [
      // "is a/an [shape] a/an [shape]" or "is a/an [shape] [shape]" (no article on second)
      /^(?:is|are)\s+(?:a|an)\s+((?:\w+\s+)*\w+?)\s+(?:a|an|also\s+(?:a|an)|always\s+(?:a|an))?\s*((?:\w+\s+)*\w+)$/,
      // "can a [shape] be a [shape]"
      /^(?:can|could)\s+(?:a|an)\s+((?:\w+\s+)*\w+?)\s+(?:be|ever be|also be)\s+(?:a|an)\s+((?:\w+\s+)*\w+?)$/,
      // "every [shape] is a [shape]"
      /^every\s+((?:\w+\s+)*\w+?)\s+is\s+(?:a|an)\s+((?:\w+\s+)*\w+?)$/,
      // "are all [shape]s [shape]s"
      /^are\s+all\s+(\w[\w\s]*?)\s+(\w[\w\s]*?)$/,
    ];
    for (const pat of isAPatterns) {
      const m = q.match(pat);
      if (m) {
        // Try full phrase first, then single word (handles "equilateral triangle")
        const rawA = m[1].trim(), rawB = m[2].trim();
        const a = this.normalizeShape(rawA) || this.normalizeShape(rawA.split(' ').pop());
        const b = this.normalizeShape(rawB) || this.normalizeShape(rawB.split(' ').pop());
        if (a && b) return { type: 'isA', subject: a, target: b, raw: q };
      }
    }

    // ── PROPERTY questions: "does a rhombus have equal diagonals?" ──
    const hasPropPatterns = [
      /^(?:do|does|did)\s+(?:a|an|all)?\s*(\w[\w\s]*?)\s+(?:have|has|contain|always have)\s+(.+)$/,
      /^(?:is|are)\s+(?:the\s+)?(?:diagonals?|sides?|angles?)\s+of\s+(?:a|an)\s+(\w[\w\s]*?)\s+(.+)$/,
    ];
    for (const pat of hasPropPatterns) {
      const m = q.match(pat);
      if (m) {
        const shape = this.normalizeShape(m[1].trim());
        if (shape) return { type: 'hasProp', subject: shape, prop: m[2].trim(), raw: q };
      }
    }

    // ── DIFFERENCE questions: "what is the difference between X and Y?" ──
    const diffPattern = /(?:difference between|compare|vs\.?|versus)\s+(?:a\s+)?(\w[\w\s]*?)\s+(?:and|vs\.?|or)\s+(?:a\s+)?(\w[\w\s]*?)$/;
    const dm = q.match(diffPattern);
    if (dm) {
      const a = this.normalizeShape(dm[1].trim());
      const b = this.normalizeShape(dm[2].trim());
      if (a && b) return { type: 'diff', a, b, raw: q };
    }

    // ── ANGLE SUM: "what are the interior angles of a hexagon?" ──
    if (/interior angle|angle sum|sum of (the )?angles|angles? (of|in) a|interior angles of/.test(q)) {
      // Try to find a shape name anywhere in the query
      const words = q.split(/\s+/);
      for (const w of words) {
        const shape = this.normalizeShape(w);
        if (shape && SHAPES[shape]?.angleSum) return { type: 'angleSum', subject: shape, raw: q };
      }
      // n-gon
      const ngon = q.match(/(\d+)[\s-]?(?:sided|gon|side)/);
      if (ngon) return { type: 'angleSumN', n: parseInt(ngon[1]), raw: q };
    }

    // ── SIDES COUNT: "how many sides does a hexagon have?" ──
    const sidesPattern = /how many sides\s+(?:does\s+)?(?:a\s+)?(\w+)/;
    const sm = q.match(sidesPattern);
    if (sm) {
      const shape = this.normalizeShape(sm[1]);
      if (shape) return { type: 'sides', subject: shape, raw: q };
    }

    // ── WHAT IS: "what is a kite?" ──
    const whatIs = q.match(/^what (?:is|are)\s+(?:a|an|the)?\s*(\w[\w\s]*?)(?:\s+in geometry)?$/);
    if (whatIs) {
      const shape = this.normalizeShape(whatIs[1].trim());
      if (shape) return { type: 'define', subject: shape, raw: q };
    }

    // ── PROPERTY OF: "what are the properties of a kite?" ──
    const propsOf = q.match(/properties\s+of\s+(?:a|an|the)?\s*(\w[\w\s]*)/);
    if (propsOf) {
      const shape = this.normalizeShape(propsOf[1].trim());
      if (shape) return { type: 'properties', subject: shape, raw: q };
    }

    // ── ANGLE SUM formula ──
    if (/(?:interior angle|angle sum|sum.*angle)/.test(q)) {
      const ngon = q.match(/(\d+)/);
      if (ngon) return { type: 'angleSumN', n: parseInt(ngon[1]), raw: q };
    }

    return null;
  },

  // ── Generate reasoning response ──────────────────────────────
  reason(query) {
    const intent = this.parseIntent(query);
    if (!intent) return null;

    switch (intent.type) {
      case 'isA':       return this.buildIsAProof(intent);
      case 'diff':      return this.buildDiff(intent);
      case 'hasProp':   return this.buildHasProp(intent);
      case 'angleSum':  return this.buildAngleSum(intent);
      case 'angleSumN': return this.buildAngleSumN(intent);
      case 'sides':     return this.buildSides(intent);
      case 'define':    return this.buildDefine(intent);
      case 'properties':return this.buildProperties(intent);
      default:          return null;
    }
  },

  // ── IS-A proof builder ───────────────────────────────────────
  buildIsAProof({ subject, target }) {
    const rel = IS_A[subject]?.[target];
    const subjectShape = SHAPES[subject];
    const targetShape  = SHAPES[target];
    if (!subjectShape || !targetShape) return null;

    const subName  = this.prettyName(subject);
    const targName = this.prettyName(target);

    let verdict, verdictColor, steps;

    if (rel === 'always') {
      verdict = `Yes — every ${subName} is always a ${targName}.`;
      verdictColor = 'green';
      steps = this.buildIsASteps(subject, target, true);
    } else if (rel === 'sometimes') {
      verdict = `Sometimes — a ${subName} can be a ${targName}, but not always.`;
      verdictColor = 'yellow';
      steps = this.buildIsASometimesSteps(subject, target);
    } else if (rel === 'never') {
      verdict = `No — a ${subName} is never a ${targName}.`;
      verdictColor = 'red';
      steps = this.buildIsANeverSteps(subject, target);
    } else {
      // Check reverse
      const rev = IS_A[target]?.[subject];
      if (rev === 'always') {
        verdict = `Not necessarily — every ${targName} is a ${subName}, but not every ${subName} is a ${targName}.`;
        verdictColor = 'yellow';
        steps = this.buildIsASometimesSteps(subject, target);
      } else {
        verdict = `Not in general — a ${subName} is not necessarily a ${targName}.`;
        verdictColor = 'yellow';
        steps = this.buildIsASometimesSteps(subject, target);
      }
    }

    return this.buildReasonCard({
      question: `Is a ${subName} a ${targName}?`,
      verdict,
      verdictColor,
      steps,
      tag: 'logic',
    });
  },

  buildIsASteps(subject, target, positive) {
    const subName  = this.prettyName(subject);
    const targName = this.prettyName(target);
    const subShape  = SHAPES[subject];
    const targShape = SHAPES[target];

    const steps = [];

    // What defines the target?
    const targetDef = this.getDefinition(target);
    steps.push({ s: `A ${targName} is defined as: ${targetDef}`, r: `Definition of ${targName}` });

    // What defines the subject?
    const subjectDef = this.getDefinition(subject);
    steps.push({ s: `A ${subName} is defined as: ${subjectDef}`, r: `Definition of ${subName}` });

    // Show why subject satisfies target's definition
    const evidence = this.getInheritanceEvidence(subject, target);
    evidence.forEach(e => steps.push(e));

    steps.push({
      s: `Therefore, every ${subName} satisfies all requirements to be a ${targName}`,
      r: `Deductive reasoning from definitions above`
    });
    steps.push({
      s: `Every ${subName} is a ${targName} ∎`,
      r: `Conclusion`
    });
    return steps;
  },

  buildIsASometimesSteps(subject, target) {
    const subName  = this.prettyName(subject);
    const targName = this.prettyName(target);
    const steps = [];

    const subDef = this.getDefinition(subject);
    const targDef = this.getDefinition(target);

    steps.push({ s: `A ${subName} is defined as: ${subDef}`, r: `Definition of ${subName}` });
    steps.push({ s: `A ${targName} requires: ${targDef}`, r: `Definition of ${targName}` });

    const extra = this.getExtraRequirements(subject, target);
    if (extra) {
      steps.push({ s: `A ${subName} does NOT automatically have: ${extra}`, r: `Not part of ${subName} definition` });
      steps.push({ s: `Only when a ${subName} also has ${extra} does it become a ${targName}`, r: `Additional condition required` });
    }

    steps.push({ s: `Counterexample: a 3×5 rectangle is NOT a square (unequal sides)`, r: `Disproves "always"` });
    steps.push({ s: `But a 4×4 rectangle IS a square (all sides equal)`, r: `Shows "sometimes" is possible` });
    steps.push({ s: `Conclusion: a ${subName} is SOMETIMES a ${targName} ∎`, r: `Conclusion` });
    return steps;
  },

  buildIsANeverSteps(subject, target) {
    const subName  = this.prettyName(subject);
    const targName = this.prettyName(target);
    const steps = [];

    steps.push({ s: `A ${targName} requires: ${this.getDefinition(target)}`, r: `Definition of ${targName}` });
    steps.push({ s: `A ${subName} has: ${this.getDefinition(subject)}`, r: `Definition of ${subName}` });

    const conflict = this.getConflict(subject, target);
    if (conflict) {
      steps.push({ s: `Conflict: ${conflict}`, r: `These properties are mutually exclusive` });
    }
    steps.push({ s: `A ${subName} cannot satisfy the definition of a ${targName}`, r: `Contradiction` });
    steps.push({ s: `Therefore, a ${subName} is NEVER a ${targName} ∎`, r: `Conclusion` });
    return steps;
  },

  // ── DIFF card ────────────────────────────────────────────────
  buildDiff({ a, b }) {
    const aName = this.prettyName(a), bName = this.prettyName(b);
    const aShape = SHAPES[a], bShape = SHAPES[b];
    if (!aShape || !bShape) return null;

    const shared = this.getSharedProps(a, b);
    const onlyA  = this.getUniqueProps(a, b);
    const onlyB  = this.getUniqueProps(b, a);

    const steps = [
      { s: `Both are ${this.sharedParent(a,b) || 'geometric shapes'}`, r: `Common category` },
      ...(shared.length ? [{ s: `Both have: ${shared.join(', ')}`, r: `Shared properties` }] : []),
      ...(onlyA.length  ? [{ s: `Only a ${aName} has: ${onlyA.join(', ')}`, r: `Unique to ${aName}` }] : []),
      ...(onlyB.length  ? [{ s: `Only a ${bName} has: ${onlyB.join(', ')}`, r: `Unique to ${bName}` }] : []),
    ];

    // Is one a subtype of the other?
    const relAB = IS_A[a]?.[b], relBA = IS_A[b]?.[a];
    let verdict;
    if (relAB === 'always') verdict = `Every ${aName} is a ${bName}, but not every ${bName} is a ${aName} — ${aName} is more specific.`;
    else if (relBA === 'always') verdict = `Every ${bName} is a ${aName}, but not every ${aName} is a ${bName} — ${bName} is more specific.`;
    else verdict = `A ${aName} and a ${bName} are distinct shapes — neither is a subtype of the other.`;

    return this.buildReasonCard({
      question: `${aName} vs. ${bName}`,
      verdict,
      verdictColor: 'blue',
      steps,
      tag: 'comparison',
    });
  },

  // ── HAS-PROP card ────────────────────────────────────────────
  buildHasProp({ subject, prop }) {
    const shapeName = this.prettyName(subject);
    const shapeData = SHAPES[subject];
    if (!shapeData) return null;

    const propLower = prop.toLowerCase();
    const props = shapeData.props || [];

    // Check if any stored property matches
    const match = props.find(p => {
      const pl = p.toLowerCase();
      return propLower.split(/\s+/).filter(w=>w.length>3).some(w => pl.includes(w));
    });

    // Some specific checks
    let answer, steps;
    if (propLower.includes('equal diagonal') || propLower.includes('congruent diagonal') || propLower.includes('same length diagonal')) {
      const has = ['square','rectangle','isoscelesTrapezoid'].includes(subject);
      answer = has ? `Yes — a ${shapeName} always has equal diagonals.` : `No — a ${shapeName} does not necessarily have equal diagonals.`;
      steps = this.buildDiagonalSteps(subject, 'equal');
    } else if (propLower.includes('perpendicular diagonal') || propLower.includes('diagonal perpendicular')) {
      const has = ['square','rhombus','kite'].includes(subject);
      answer = has ? `Yes — the diagonals of a ${shapeName} are always perpendicular.` : `No — the diagonals of a ${shapeName} are not necessarily perpendicular.`;
      steps = this.buildDiagonalSteps(subject, 'perp');
    } else if (propLower.includes('right angle') || propLower.includes('90')) {
      const has = ['square','rectangle'].includes(subject);
      answer = has ? `Yes — a ${shapeName} always has right angles (90°).` : `No — a ${shapeName} does not require right angles.`;
      steps = [
        { s: `Definition of ${shapeName}: ${this.getDefinition(subject)}`, r: `Definition` },
        { s: answer, r: `Conclusion` }
      ];
    } else if (match) {
      answer = `Yes — a ${shapeName} has the property: ${match}.`;
      steps = [
        { s: `By definition, a ${shapeName} has: ${this.getDefinition(subject)}`, r: `Definition` },
        { s: `This includes: ${match}`, r: `Property of ${shapeName}` },
        { s: answer, r: `Conclusion` }
      ];
    } else {
      answer = `Not necessarily — that is not a guaranteed property of a ${shapeName}.`;
      steps = [
        { s: `Properties of a ${shapeName}: ${(shapeData.props||[]).join('; ') || 'see definition'}`, r: `Definition` },
        { s: `The requested property is not among them`, r: `By inspection` },
        { s: answer, r: `Conclusion` }
      ];
    }

    return this.buildReasonCard({
      question: `Does a ${shapeName} have ${prop}?`,
      verdict: answer,
      verdictColor: answer.startsWith('Yes') ? 'green' : 'red',
      steps,
      tag: 'property check',
    });
  },

  buildDiagonalSteps(shape, type) {
    const name = this.prettyName(shape);
    const has = type === 'equal'
      ? ['square','rectangle','isoscelesTrapezoid'].includes(shape)
      : ['square','rhombus','kite'].includes(shape);

    const steps = [{ s: `A ${name} is defined as: ${this.getDefinition(shape)}`, r: `Definition` }];
    if (has && type === 'equal') {
      steps.push({ s: `Its diagonals are congruent by the ${this.getDiagTheorem(shape)}`, r: `Theorem` });
      steps.push({ s: `Therefore its diagonals ARE equal ∎`, r: `Conclusion` });
    } else if (has && type === 'perp') {
      steps.push({ s: `All four sides are equal (or two pairs of consecutive sides equal for a kite)`, r: `Definition property` });
      steps.push({ s: `Equal sides create congruent triangles with the diagonals → diagonals ⊥`, r: `SSS congruence + CPCTC` });
      steps.push({ s: `Therefore its diagonals ARE perpendicular ∎`, r: `Conclusion` });
    } else {
      steps.push({ s: `Nothing in the definition of ${name} guarantees this property`, r: `Not in definition` });
      steps.push({ s: `Counterexample exists: a generic ${name} where this fails`, r: `Disproof` });
      steps.push({ s: `Therefore NOT necessarily true ∎`, r: `Conclusion` });
    }
    return steps;
  },

  // ── ANGLE SUM cards ──────────────────────────────────────────
  buildAngleSum({ subject }) {
    const name = this.prettyName(subject);
    const shape = SHAPES[subject];
    const n = shape.sides;
    const sum = shape.angleSum;

    const steps = [
      { s: `A ${name} has ${n} sides`, r: `Definition` },
      { s: `By the Polygon Interior Angles Theorem: sum = (n−2) × 180°`, r: `Theorem 7.1` },
      { s: `For n = ${n}: (${n}−2) × 180° = ${n-2} × 180°`, r: `Substitution` },
      { s: `= ${sum}°`, r: `Arithmetic` },
      { s: `Sum of interior angles of a ${name} = ${sum}° ∎`, r: `Conclusion` },
    ];

    if (shape.allAngles) {
      steps.push({ s: `Since all angles are equal: each angle = ${sum}° ÷ ${n} = ${shape.allAngles}°`, r: `Regular polygon corollary` });
    }

    return this.buildReasonCard({
      question: `Interior angle sum of a ${name}?`,
      verdict: `The interior angles of a ${name} add up to ${sum}°.`,
      verdictColor: 'blue',
      steps,
      tag: 'angle sum',
    });
  },

  buildAngleSumN({ n }) {
    const sum = (n - 2) * 180;
    const steps = [
      { s: `The polygon has ${n} sides`, r: `Given` },
      { s: `Polygon Interior Angles Theorem: sum = (n−2) × 180°`, r: `Theorem 7.1` },
      { s: `Substitute n = ${n}: (${n}−2) × 180°`, r: `Substitution` },
      { s: `= ${n-2} × 180° = ${sum}°`, r: `Arithmetic` },
      { s: `Sum of interior angles = ${sum}° ∎`, r: `Conclusion` },
    ];
    return this.buildReasonCard({
      question: `Interior angle sum of a ${n}-gon?`,
      verdict: `A ${n}-sided polygon has interior angles that sum to ${sum}°.`,
      verdictColor: 'blue',
      steps,
      tag: 'angle sum',
    });
  },

  // ── SIDES card ───────────────────────────────────────────────
  buildSides({ subject }) {
    const name = this.prettyName(subject);
    const shape = SHAPES[subject];
    if (!shape?.sides) return null;
    const steps = [
      { s: `A ${name} is defined as a polygon with ${shape.sides} sides`, r: `Definition of ${name}` },
      { s: `A ${name} has ${shape.sides} sides ∎`, r: `Conclusion` },
    ];
    return this.buildReasonCard({
      question: `How many sides does a ${name} have?`,
      verdict: `A ${name} has ${shape.sides} sides.`,
      verdictColor: 'blue',
      steps,
      tag: 'definition',
    });
  },

  // ── DEFINE card ──────────────────────────────────────────────
  buildDefine({ subject }) {
    const name = this.prettyName(subject);
    const shape = SHAPES[subject];
    if (!shape) return null;

    const def = this.getDefinition(subject);
    const props = shape.props || [];
    const subtypes = shape.subtypes || [];
    const isA = shape.isA || [];

    const steps = [
      { s: `Definition: ${def}`, r: `Formal definition` },
      ...(shape.sides ? [{ s: `Has ${shape.sides} sides`, r: `Property` }] : []),
      ...(shape.angleSum ? [{ s: `Interior angles sum to ${shape.angleSum}°`, r: `Polygon Interior Angles Theorem` }] : []),
      ...props.slice(0,4).map(p => ({ s: p, r: `Property of ${name}` })),
      ...(isA.length ? [{ s: `A ${name} is also a: ${isA.join(', ')}`, r: `Classification hierarchy` }] : []),
      ...(subtypes.length ? [{ s: `Special types of ${name}: ${subtypes.join(', ')}`, r: `Subtypes` }] : []),
    ];

    return this.buildReasonCard({
      question: `What is a ${name}?`,
      verdict: def,
      verdictColor: 'blue',
      steps,
      tag: 'definition',
    });
  },

  // ── PROPERTIES card ──────────────────────────────────────────
  buildProperties({ subject }) {
    const name = this.prettyName(subject);
    const shape = SHAPES[subject];
    if (!shape) return null;

    const props = shape.props || [];
    const steps = [
      { s: `Definition of ${name}: ${this.getDefinition(subject)}`, r: `Definition` },
      ...props.map((p,i) => ({ s: p, r: `Property ${i+1} of ${name}` })),
      ...(shape.isA?.length ? [{ s: `Inherits all properties of: ${shape.isA.join(' → ')}`, r: `Inheritance from parent shapes` }] : []),
    ];

    return this.buildReasonCard({
      question: `Properties of a ${name}`,
      verdict: `A ${name} has ${props.length + (shape.isA?.length||0)} key properties listed below.`,
      verdictColor: 'blue',
      steps,
      tag: 'properties',
    });
  },

  // ── Helpers ──────────────────────────────────────────────────

  prettyName(key) {
    const names = {
      isoscelesTrapezoid: 'isosceles trapezoid',
      equilateral: 'equilateral triangle',
    };
    return names[key] || key;
  },

  getDefinition(shape) {
    const defs = {
      square:       'a parallelogram with four equal sides and four right angles',
      rectangle:    'a parallelogram with four right angles (90°)',
      rhombus:      'a parallelogram with four equal sides',
      parallelogram:'a quadrilateral with both pairs of opposite sides parallel',
      trapezoid:    'a quadrilateral with exactly one pair of parallel sides',
      isoscelesTrapezoid: 'a trapezoid with equal legs (non-parallel sides)',
      kite:         'a quadrilateral with two pairs of consecutive congruent sides',
      quadrilateral:'a polygon with exactly four sides',
      polygon:      'a closed figure with straight sides',
      triangle:     'a polygon with three sides and three angles summing to 180°',
      equilateral:  'a triangle with all three sides equal and all angles 60°',
      isosceles:    'a triangle with at least two equal sides',

  getSharedProps(a, b) {
    const pa = SHAPES[a]?.props || [];
    const pb = SHAPES[b]?.props || [];
    const shared = [];
    for (const p of pa) {
      if (pb.some(q => q.toLowerCase().includes(p.toLowerCase().split(' ')[0]) || p.toLowerCase().includes(q.toLowerCase().split(' ')[0]))) {
        shared.push(p);
      }
    }
    // Common parent check
    const aIsA = SHAPES[a]?.isA || [];
    const bIsA = SHAPES[b]?.isA || [];
    const common = aIsA.filter(x => bIsA.includes(x));
    if (common.length) shared.push(`both are ${common[0]}s`);
    return [...new Set(shared)].slice(0,3);
  },

  getUniqueProps(a, b) {
    const aShape = SHAPES[a] || {};
    const bShape = SHAPES[b] || {};
    const unique = [];
    if (aShape.allAngles === 90 && bShape.allAngles !== 90) unique.push('all angles 90°');
    if (aShape.allSidesEqual && !bShape.allSidesEqual) unique.push('all sides equal');
    if ((aShape.props||[]).length) {
      const bProps = (bShape.props||[]).join(' ').toLowerCase();
      for (const p of aShape.props) {
        const key = p.split(' ').slice(0,2).join(' ').toLowerCase();
        if (!bProps.includes(key)) unique.push(p);
      }
    }
    return [...new Set(unique)].slice(0,3);
  },

  sharedParent(a, b) {
    const aIsA = [a, ...(SHAPES[a]?.isA || [])];
    const bIsA = [b, ...(SHAPES[b]?.isA || [])];
    const common = aIsA.filter(x => bIsA.includes(x));
    return common[0] || null;
  },

// ── Known proof lookup ────────────────────────────────────────
function findKnownProof(query) {
  const q = query.toLowerCase();
  // Remove "prove", "proof of", "show that", etc.
  const cleaned = q
    .replace(/^(prove|proof of|proof that|show that|show me|demonstrate|derive|verify|establish)\s+/i, '')
    .replace(/\b(the|that|a|an)\b\s*/g, '')
    .trim();

  let best = null, bestScore = 0;
  for (const entry of KNOWN_PROOFS) {
    for (const key of entry.keys) {
      // Exact match in full query
      if (q.includes(key)) { return entry; }
      // Score by word overlap
      const keyWords = key.split(/\s+/);
      const score = keyWords.filter(w => cleaned.includes(w) && w.length > 3).length;
      if (score > bestScore && score >= 2) { bestScore = score; best = entry; }
    }
  }
  return best;
}

// ── Is this a "prove X" request? ─────────────────────────────
function isProveRequest(query) {
  const q = query.toLowerCase();
  return /^(prove|proof of|proof that|show that|show me how to prove|demonstrate|derive that|verify that)\b/.test(q);
}

// ── Extract theorem name from query ──────────────────────────
function extractTheoremName(query) {
  return query
    .replace(/^(prove|proof of|proof that|show that|show me|demonstrate|derive|verify)\s+/i, '')
    .replace(/^(the|that|a|an)\s+/i, '')
    .trim();
}

// ── User-built proof generator ────────────────────────────────
function generateUserProof(session) {
  // Parse the given list from a string like "AB ≅ CD, ∠A ≅ ∠B"
  const givenList = session.given
    .split(/[,;]+/)
    .map(s => s.trim())
    .filter(Boolean);

  // Parse conditional into hypothesis / conclusion
  const ifThen = session.conditional.match(/if\s+(.+?)[,]?\s+then\s+(.+)/i);
  const hypothesis  = ifThen ? ifThen[1].trim() : session.given;
  const conclusion  = ifThen ? ifThen[2].trim() : session.prove;

  // Generate logical steps
  const steps = generateLogicSteps(hypothesis, conclusion, givenList, session.prove);

  return {
    title: session.title,
    conditional: session.conditional,
    given: givenList,
    prove: session.prove || conclusion,
    diagramTopic: inferDiagramTopic(session.title + ' ' + session.conditional),
    steps,
    explanation: `This proof was constructed from your conditional statement. The logical chain starts from your given information and works step-by-step to reach the conclusion using definitions, postulates, and theorems.`,
  };
}

// ── Logic step generator ──────────────────────────────────────
function generateLogicSteps(hypothesis, conclusion, givenList, prove) {
  const steps = [];
  const hyp = hypothesis.toLowerCase();
  const conc = conclusion.toLowerCase();
  const prov = (prove || '').toLowerCase();

  // Always start with the given
  givenList.forEach(g => steps.push({ statement: g, reason: 'Given' }));

  // ── Pattern matching for common proof structures ──────────

  // Congruent triangles → CPCTC
  if (conc.includes('≅') && (conc.includes('△') || hyp.includes('triangle'))) {
    if (hyp.includes('sss') || (givenList.filter(g => g.includes('≅')).length >= 3)) {
      steps.push({ statement: 'The three pairs of sides are congruent (from given)', reason: 'Given' });
      steps.push({ statement: 'The two triangles are congruent', reason: 'SSS Congruence Postulate' });
      steps.push({ statement: prove || conclusion, reason: 'CPCTC' });
      return steps;
    }
    if (hyp.includes('sas') || (givenList.some(g => g.includes('∠')) && givenList.filter(g => g.includes('≅')).length >= 2)) {
      steps.push({ statement: 'Two sides and the included angle are congruent (from given)', reason: 'Given' });
      steps.push({ statement: 'The two triangles are congruent', reason: 'SAS Congruence Postulate' });
      steps.push({ statement: prove || conclusion, reason: 'CPCTC' });
      return steps;
    }
  }

  // Parallel lines → angle relationships
  if (hyp.includes('parallel') || givenList.some(g => g.includes('∥'))) {
    steps.push({ statement: 'The lines are parallel', reason: 'Given' });
    if (prov.includes('alternate') || prov.includes('∠')) {
      steps.push({ statement: 'A transversal crosses the parallel lines', reason: 'Given / construction' });
      steps.push({ statement: 'Alternate interior angles are formed', reason: 'Definition of alternate interior angles' });
      steps.push({ statement: prove || conclusion, reason: 'Alternate Interior Angles Theorem' });
      return steps;
    }
  }

  // Right angle / perpendicular
  if (hyp.includes('perpendicular') || hyp.includes('right angle') || givenList.some(g => g.includes('⊥'))) {
    steps.push({ statement: 'The lines/segments are perpendicular', reason: 'Given' });
    steps.push({ statement: 'The angle between them measures 90°', reason: 'Definition of perpendicular' });
    if (prov.includes('90') || prov.includes('right')) {
      steps.push({ statement: prove || conclusion, reason: 'Definition of right angle' });
      return steps;
    }
  }

  // Midpoint
  if (hyp.includes('midpoint') || givenList.some(g => g.toLowerCase().includes('midpoint'))) {
    const midSeg = givenList.find(g => g.toLowerCase().includes('midpoint')) || '';
    steps.push({ statement: 'The point divides the segment into two equal parts', reason: 'Definition of midpoint' });
    steps.push({ statement: 'The two parts add to the whole segment', reason: 'Segment Addition Postulate' });
    steps.push({ statement: prove || conclusion, reason: 'Substitution and algebra' });
    return steps;
  }

  // Isosceles triangle
  if (hyp.includes('isosceles') || (hyp.includes('two sides') && hyp.includes('equal'))) {
    steps.push({ statement: 'The triangle has two congruent sides', reason: 'Given (isosceles definition)' });
    steps.push({ statement: 'Draw the median/altitude from the apex to the base', reason: 'Construction' });
    steps.push({ statement: 'The two resulting triangles are congruent', reason: 'SSS Congruence Postulate' });
    steps.push({ statement: prove || conclusion, reason: 'CPCTC' });
    return steps;
  }

  // Angle bisector
  if (hyp.includes('bisect') || givenList.some(g => g.toLowerCase().includes('bisect'))) {
    steps.push({ statement: 'The ray divides the angle into two equal parts', reason: 'Definition of angle bisector' });
    steps.push({ statement: 'The two angles add to the whole angle', reason: 'Angle Addition Postulate' });
    steps.push({ statement: prove || conclusion, reason: 'Substitution and algebra' });
    return steps;
  }

  // Supplementary / 180°
  if (conc.includes('180') || conc.includes('supplementary')) {
    steps.push({ statement: 'The angles together form a straight line', reason: 'Given / Linear pair' });
    steps.push({ statement: 'A straight angle measures 180°', reason: 'Definition of straight angle' });
    steps.push({ statement: prove || conclusion, reason: 'Angle Addition Postulate' });
    return steps;
  }

  // Generic fallback — build a reasonable skeleton
  steps.push({ statement: 'Identify all relevant definitions that apply', reason: 'Analysis of given information' });
  steps.push({ statement: 'Apply the appropriate theorem or postulate', reason: 'Geometric reasoning' });
  if (givenList.length >= 2) {
    steps.push({ statement: 'Combine the given information', reason: 'Substitution / Transitive Property' });
  }
  steps.push({ statement: prove || conclusion, reason: 'Conclusion from steps above' });

  return steps;
}

// ── Infer diagram topic from title/conditional ────────────────
function inferDiagramTopic(text) {
  const t = text.toLowerCase();
  if (t.includes('triangle') && t.includes('sum')) return 'triangle angles';
  if (t.includes('vertical angle'))  return 'vertical angle';
  if (t.includes('linear pair') || t.includes('supplementary')) return 'linear pair';
  if (t.includes('parallel'))        return 'parallel lines';
  if (t.includes('isosceles'))       return 'generic triangle';
  if (t.includes('midpoint') || t.includes('segment')) return 'segment addition';
  if (t.includes('angle bisector'))  return 'angle bisector';
  if (t.includes('pythagorean') || t.includes('right triangle')) return 'pythagorean';
  if (t.includes('circle') || t.includes('inscribed')) return 'inscribed angle';
  if (t.includes('chord'))           return 'congruent corresponding chords';
  if (t.includes('tangent'))         return 'tangent line to circle';
  if (t.includes('parallelogram'))   return 'parallelogram diagonals';
  if (t.includes('rhombus'))         return 'rhombus';
  if (t.includes('rectangle'))       return 'rectangle';
  if (t.includes('trapezoid'))       return 'isosceles trapezoid';
  if (t.includes('triangle'))        return 'generic triangle';
  return 'generic triangle';
}

// ── Dialogue handler ──────────────────────────────────────────
function handleProveDialogue(input) {
  const step = ProofSession.step;

  if (step === 'awaiting_conditional') {
    const cleaned = input.trim();
    if (cleaned.length < 8) {
      showProveDialogueCard(
        '❓ Try again',
        `That seems too short. Please write the full if-then statement.<br><br>
         Example: <em>"If AB ≅ CD and BC ≅ DA, then ABCD is a parallelogram."</em>`,
        [{ label: 'Cancel', action: 'cancel' }]
      );
      return;
    }

    // Try to auto-solve from the conditional right now
    if (typeof AutoProver !== 'undefined') {
      const autoProof = AutoProver.solveFromConditional(cleaned, ProofSession.title);
      if (autoProof && autoProof.steps && autoProof.steps.length > 2) {
        ProofSession.active = false;
        ProofSession.step = 'done';
        const intro = `I can solve that from your conditional. Here\'s the proof for "${autoProof.title}":`;
        const msgEl = appendMsg('assistant', '<p></p>');
        const pEl = msgEl.querySelector('p');
        streamText(pEl, intro, () => {
          const cardEl = document.createElement('div');
          cardEl.style.opacity = '0';
          cardEl.style.transform = 'translateY(8px)';
          cardEl.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
          cardEl.innerHTML = buildCustomProofCard({
            title: autoProof.title,
            conditional: cleaned,
            given: autoProof.given,
            prove: autoProof.prove,
            diagramTopic: autoProof.diag,
            steps: autoProof.steps,
            explanation: autoProof.explanation,
          }, currentFormat);
          msgEl.querySelector('.msg-body').appendChild(cardEl);
          scrollThread();
          requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
        });
        ProofSession = { active: false, step: null, title: '', conditional: '', given: [], prove: '', rawInput: '', knownKey: null };
        return;
      }
    }

    ProofSession.conditional = cleaned;
    ProofSession.step = 'awaiting_given';

    // Try to auto-parse the hypothesis as the given
    const ifMatch = cleaned.match(/^[Ii]f\s+(.+?)[,.]?\s+[Tt]hen/);
    const suggestion = ifMatch ? ifMatch[1].trim() : '';

    showProveDialogueCard(
      '✓ Got it. Now, what is <strong>Given</strong>?',
      `List the given information — what you're allowed to assume is true.<br><br>
       ${suggestion ? `Based on your conditional, this might be: <code>${escHtml(suggestion)}</code><br>Type it to confirm, or enter something different.` : 
       'Example: <code>AB ≅ CD, ∠A ≅ ∠D</code>'}`,
      suggestion ? [
        { label: suggestion, action: 'quicksend' },
        { label: 'Cancel', action: 'cancel' }
      ] : [{ label: 'Cancel', action: 'cancel' }]
    );
    return;
  }

  if (step === 'awaiting_given') {
    ProofSession.given = input.trim();
    ProofSession.step = 'awaiting_prove';

    // Auto-parse the conclusion from the conditional
    const thenMatch = ProofSession.conditional.match(/[Tt]hen\s+(.+?)\.?\s*$/);
    const suggestion = thenMatch ? thenMatch[1].trim() : '';

    showProveDialogueCard(
      '✓ Got it. What do you want to <strong>Prove</strong>?',
      `What is the conclusion — what you need to show is true?<br><br>
       ${suggestion ? `From your conditional, this would be: <code>${escHtml(suggestion)}</code><br>Type it to confirm, or enter something different.` :
       'Example: <code>△ABC ≅ △DEF</code>'}`,
      suggestion ? [
        { label: suggestion, action: 'quicksend' },
        { label: 'Cancel', action: 'cancel' }
      ] : [{ label: 'Cancel', action: 'cancel' }]
    );
    return;
  }

  if (step === 'awaiting_prove') {
    ProofSession.prove = input.trim();
    ProofSession.step = 'done';
    ProofSession.active = false;

    // Generate the proof
    const proof = generateUserProof(ProofSession);

    const intro = `Here's your proof for "${proof.title}":`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      cardEl.innerHTML = buildCustomProofCard(proof, currentFormat);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => {
        cardEl.style.opacity = '1';
        cardEl.style.transform = 'translateY(0)';
        scrollThread();
      });
    });

    // Reset session
    ProofSession = { active: false, step: null, title: '', conditional: '', given: [], prove: '', rawInput: '', knownKey: null };
    return;
  }
}

// ── Cancel session ────────────────────────────────────────────
function cancelProveSession() {
  ProofSession = { active: false, step: null, title: '', conditional: '', given: [], prove: '', rawInput: '', knownKey: null };
  streamingReply("Proof cancelled. Ask me anything else!");
}

// ── Term lookup ───────────────────────────────────────────────
var GeoTerms = {

  // Find matching term from query
  findTerm(query) {
    const q = query.toLowerCase().trim().replace(/[?!.]+$/, '');
    let best = null, bestScore = 0;

    for (const [key, term] of Object.entries(GEO_TERMS)) {
      let score = 0;
      // Direct key match
      if (q.includes(key)) score += key.length * 5;
      // Keyword matches
      for (const kw of (term.keywords || [])) {
        if (q.includes(kw)) score += kw.length * 4;
        if (kw.includes(q) && q.length > 4) score += 20;
      }
      if (score > bestScore) { bestScore = score; best = { key, term, score }; }
    }
    return bestScore >= 15 ? best : null;
  },

  // Build the term explanation card
  buildTermCard(termData) {
    const { key, term } = termData;
    const diagramSVG = (typeof DiagramRenderer !== 'undefined' && term.diagram)
      ? DiagramRenderer.render(term.diagram, null) : '';

    const proofHtml = term.proofSummary ? `
      <div class="proof-section" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">
        <div class="proof-section-lbl">Proof sketch</div>
        <table class="proof-table">
          <thead><tr><th>#</th><th>Statement</th><th>Reason</th></tr></thead>
          <tbody>
            ${term.proofSummary.map((s,i)=>`
              <tr><td>${i+1}</td><td>${escHtml(s.s)}</td><td>${escHtml(s.r)}</td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>` : '';

    const relatedBtn = term.relatedProof ? `
      <button class="hint-chip" onclick="quickSend('prove ${escHtml(term.relatedProof)}')"
        style="margin-top:8px;">See full proof →</button>` : '';

    return `<div class="proof-card">
      <div class="proof-card-head">
        <span class="proof-card-title">${escHtml(term.title)}</span>
        <span class="proof-card-badge" style="background:rgba(92,184,92,0.1);border-color:rgba(92,184,92,0.25);color:#5cb85c;">term</span>
      </div>
      <div class="proof-section">
        <div class="proof-section-lbl">Definition</div>
        <div class="proof-conditional">${escHtml(term.definition)}</div>
      </div>
      <div class="proof-section">
        <div class="proof-section-lbl">Key property</div>
        <div class="proof-explanation">${escHtml(term.property)}</div>
      </div>
      ${term.example ? `<div class="proof-section">
        <div class="proof-section-lbl">Example</div>
        <div class="proof-explanation" style="font-family:var(--mono);font-size:12.5px;">${escHtml(term.example)}</div>
      </div>` : ''}
      ${diagramSVG ? `<div class="proof-section">
        <div class="proof-section-lbl">Diagram</div>
        <div class="proof-diagram-wrap">${diagramSVG}</div>
      </div>` : ''}
      ${proofHtml}
      ${relatedBtn}
    </div>`;
  },

  // Is this query asking about a term definition?
  isTermQuery(q) {
    const ql = q.toLowerCase();
    return (
      /^(what (is|are|does)|define|explain|tell me about|describe|how does)\b/.test(ql) ||
      /\b(definition|mean|means|defined as)\b/.test(ql) ||
      // Bare term queries like "vertical angles" or "linear pair"
      Object.keys(GEO_TERMS).some(k => {
        const norm = ql.replace(/[?!.]+$/,'').trim();
        return norm === k || norm === k + 's';
      })
    );
  },
};


// ── Auto proof solver: given just a conditional statement ──────
var AutoProver = {

  // Parse an if-then conditional and generate a proof
  solveFromConditional(conditional, title) {
    const cond = conditional.trim();
    const ifThen = cond.match(/^[Ii]f\s+(.+?)[,]?\s+[Tt]hen\s+(.+?)\.?\s*$/);
    if (!ifThen) return null;

    const hypothesis  = ifThen[1].trim().toLowerCase();
    const conclusion  = ifThen[2].trim().toLowerCase();
    const hypOrig     = ifThen[1].trim();
    const concOrig    = ifThen[2].trim();

    // ── Pattern library ────────────────────────────────────────
    const patterns = [

      // VERTICAL ANGLES

      // LINEAR PAIR → SUPPLEMENTARY

          title: title || 'Linear Pair Theorem',
          diag: 'linear pair',
          given: [hO],
          prove: cO,
          steps: [
            { s: '∠1 and ∠2 form a linear pair', r: 'Given' },
            { s: 'Their non-common sides form a straight line', r: 'Definition of linear pair' },
            { s: '∠1 + ∠2 = 180°', r: 'Angle Addition Postulate (angles on a straight line)' },
            { s: '∠1 and ∠2 are supplementary ∎', r: 'Definition of supplementary angles' },
          ],
          explanation: 'A linear pair always sits on a straight line — and a straight angle is 180°. Since the two angles together fill that straight angle, they must add to 180°.',
        })
      },

      // SUPPLEMENTARY → find other angle
      {
        match: h => h.includes('supplement') || (h.includes('180') && h.includes('angle')),
        build: (h, c, hO, cO) => ({
          title: title || 'Supplement Theorem',
          diag: 'linear pair',
          given: [hO],
          prove: cO,
          steps: [
            { s: 'm∠A + m∠B = 180°', r: 'Given (supplementary angles)' },
            { s: 'm∠B = 180° − m∠A', r: 'Subtraction Property of Equality' },
            { s: cO, r: 'Substitution / definition of supplementary' },
          ],
          explanation: 'Supplementary angles sum to 180°. Subtract one from 180° to find the other.',
        })
      },

      // COMPLEMENTARY → find other angle
      {
        match: h => h.includes('complement') || (h.includes('90') && h.includes('angle')),
        build: (h, c, hO, cO) => ({
          title: title || 'Complement Theorem',
          diag: 'linear pair',
          given: [hO],
          prove: cO,
          steps: [
            { s: 'm∠A + m∠B = 90°', r: 'Given (complementary angles)' },
            { s: 'm∠B = 90° − m∠A', r: 'Subtraction Property of Equality' },
            { s: cO, r: 'Substitution / definition of complementary' },
          ],
          explanation: 'Complementary angles sum to 90°. Subtract one from 90° to find the other.',
        })
      },

      // RIGHT ANGLES → congruent
      {
        match: h => h.includes('right angle') && (h.includes('two') || h.includes('both')),
        build: (h, c, hO, cO) => ({
          title: title || 'Right Angle Congruence Theorem',
          diag: 'linear pair',

          prove: cO,
          steps: [

        })

      // PERPENDICULAR → right angles
      {

        })
      },

      // PARALLEL LINES → alternate interior angles
      {
        match: h => h.includes('parallel') && (h.includes('alternate') || h.includes('transversal')),
        build: (h, c, hO, cO) => ({
          title: title || 'Alternate Interior Angles Theorem',

          given: [hO],
          prove: cO,
          steps: [
            { s: 'ℓ₁ ∥ ℓ₂, transversal t crosses both', r: 'Given' },
            { s: '∠1 + ∠3 = 180°', r: 'Linear Pair Postulate (at first intersection)' },
            { s: '∠2 + ∠3 = 180°', r: 'Co-Interior Angles Theorem (parallel lines)' },
            { s: '∠1 + ∠3 = ∠2 + ∠3', r: 'Transitive Property' },
            { s: '∠1 = ∠2', r: 'Subtraction Property of Equality' },

        })

      // ISOSCELES TRIANGLE → base angles
      {
        match: h => h.includes('isosceles') || (h.includes('two sides') && h.includes('congruent')),

            { s: 'Let M be the midpoint of BC; draw segment AM', r: 'Construction (Ruler Postulate + Two-Point Postulate)' },
            { s: 'BM ≅ MC', r: 'Definition of midpoint' },
            { s: 'AM ≅ AM', r: 'Reflexive Property of Congruence' },
            { s: '△ABM ≅ △ACM', r: 'SSS Congruence Postulate (AB=AC, BM=MC, AM=AM)' },

          ],
          explanation: 'Draw the median from the apex to the base midpoint. This splits the triangle into two smaller ones that share the median and have the two given equal sides plus equal base halves — SSS makes them congruent, so base angles match by CPCTC.',

      {
        match: h => h.includes('midpoint'),

            { s: 'AM + AM = AB → 2·AM = AB', r: 'Substitution (AM = MB)' },
            { s: 'AM = ½AB', r: 'Division Property of Equality' },
            { s: cO, r: 'Substitution' },
          ],
          explanation: 'The midpoint splits the segment equally. Using Segment Addition and substitution, each half equals ½ of the total.',
        })
      },

      // ANGLE BISECTOR → equal angles
      {
        match: h => h.includes('bisect') && h.includes('angle'),
        build: (h, c, hO, cO) => ({
          title: title || 'Angle Bisector Theorem',
          diag: 'angle bisector',
          given: [hO],
          prove: cO,
          steps: [
            { s: 'Ray BD bisects ∠ABC', r: 'Given' },
            { s: '∠ABD = ∠DBC', r: 'Definition of angle bisector' },
            { s: '∠ABD + ∠DBC = ∠ABC', r: 'Angle Addition Postulate' },
            { s: '2·∠ABD = ∠ABC', r: 'Substitution (∠ABD = ∠DBC)' },
            { s: '∠ABD = ½·∠ABC', r: 'Division Property of Equality' },
            { s: cO, r: 'Substitution / conclusion' },
          ],
          explanation: 'An angle bisector creates two equal halves. Angle Addition gives the sum, substitution and division give each half equals ½ of the whole.',
        })
      },

      // HYPOTENUSE-LEG (HL)
      {
        match: h => h.includes('hypotenuse') || (h.includes('right triangle') && h.includes('leg')),
        build: (h, c, hO, cO) => ({
          title: 'Hypotenuse-Leg (HL) Congruence Theorem',
          diag: 'SSS congruence postulate',

          title: 'Right Triangle Congruence',

          return {
            title: title || 'Triangle Congruence',

          title: title || 'Triangle Sum Theorem',

            { s: '∠2 ≅ ∠C (alternate interior angles, ℓ ∥ AC)', r: 'Alternate Interior Angles Theorem' },
            { s: '∠1 + ∠B + ∠2 = 180°', r: 'Angles on a straight line (Linear Pair)' },
            { s: 'm∠A + m∠B + m∠C = 180° ∎', r: 'Substitution (∠1=∠A, ∠2=∠C)' },
          ],
          explanation: 'Draw a line through one vertex parallel to the opposite side. Alternate interior angles let you "move" two angles to sit alongside the third, forming a straight line.',

          diag: 'triangle angles',
          given: [hO],
          prove: cO,
          steps: [
            { s: '∠ACD is an exterior angle of △ABC', r: 'Given' },
            { s: 'm∠A + m∠B + m∠ACB = 180°', r: 'Triangle Sum Theorem' },
            { s: '∠ACB + ∠ACD = 180°', r: 'Linear Pair Postulate' },
            { s: 'm∠ACD = m∠A + m∠B ∎', r: 'Substitution and Subtraction Property' },
          ],
          explanation: 'The exterior angle and the adjacent interior angle are a linear pair (180°). All three interior angles also sum to 180°. Substituting shows the exterior angle equals the sum of the two remote interior angles.',
        })
      },

    ];

    // Find best matching pattern
    for (const pat of patterns) {
      if (pat.match(hypothesis)) {
        const result = pat.build(hypothesis, conclusion, hypOrig, concOrig);

      }
    }

    // Generic fallback
    return {
      title: title || 'Custom Proof',
      diag: inferDiagramTopic ? inferDiagramTopic(conditional) : 'generic triangle',
      given: [hypOrig],
      prove: concOrig,
      steps: [
        { s: hypOrig, r: 'Given (hypothesis from conditional)' },
        { s: 'Apply relevant definitions and postulates', r: 'Geometric reasoning' },
        { s: 'Combine statements using properties of equality/congruence', r: 'Substitution / Transitive Property' },
        { s: concOrig + ' ∎', r: 'Conclusion' },
      ],
      explanation: `This proof starts from the hypothesis "${hypOrig}" and reasons to the conclusion "${concOrig}" using geometric definitions and postulates.`,
    };
  },
};

// ── Escape HTML ──────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

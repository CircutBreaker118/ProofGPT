  'imaginary','complex number',
  'percent','percentage','fraction',
  'trig','sine','cosine','tangent','soh cah toa',
  'radian','unit circle',
  'sequence','series',
  'absolute value',
];

function isMathOnlyQuery(q) {
  const ql = q.toLowerCase();
  return MATH_ONLY_TERMS.some(term => {
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = new RegExp('(^|\\s)' + escaped + '(\\s|$|s\\b)');
    return re.test(ql);
  });
}

// ── Search engine ────────────────────────────────────
function scoreProof(proof, query) {
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/).filter(w => w.length > 1);
  let score = 0;

  if (proof.title.toLowerCase() === q) score += 200;
  if (proof.title.toLowerCase().includes(q)) score += 100;
  if (proof.number && q === proof.number) score += 150;
  // Boost for well-known abbreviations in proof titles
  const abbrevs = ['sss','sas','asa','aas','aa','hl'];
  for (const ab of abbrevs) {
    if (q.includes(ab) && proof.title.toLowerCase().includes(ab)) score += 60;
  }
  if (proof.number && q.includes(proof.number)) score += 90;

  for (const kw of proof.keywords) {
    const kwl = kw.toLowerCase();
    if (q.includes(kwl)) score += 60;
    if (kwl.includes(q) && q.length >= 5) score += 40;
    for (const w of words) {
      if (w.length >= 4) {
        const re = new RegExp('(^|[^a-z])' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '([^a-z]|$)');
        if (re.test(kwl)) score += 12;
      } else if (kwl === w || kwl.startsWith(w+' ') || kwl.endsWith(' '+w) || kwl.includes(' '+w+' ')) {
        score += 12;
      }
    }
  }

  for (const w of words) {
    if (w.length >= 4 && proof.title.toLowerCase().includes(w)) score += 18;
  }

  if (q.includes('postulate') && proof.category === 'postulate') score += 12;
  if (q.includes('theorem') && proof.category === 'theorem') score += 12;

  return score;
}

function countMeaningfulMatches(proof, query) {
  // Count how many DISTINCT meaningful words from the query match this proof
  const q = query.toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length >= 3);  // include short words like SAS, SSS, AA
  let matched = 0;
  for (const w of words) {
    if (proof.title.toLowerCase().includes(w)) { matched++; continue; }
    if (proof.keywords.some(kw => {
      const re = new RegExp('(^|[^a-z])' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '([^a-z]|$)');
      return re.test(kw.toLowerCase());
    })) matched++;
  }
  return matched;
}

// Terms that MUST match the proof title/number specifically - block fuzzy hits
const PROOF_EXACT_TERMS = {
  'hypotenuse': ['hypotenuse','hl'],
  'hypotenuse leg': ['hypotenuse','hl'],
  'midsegment': ['midsegment'],
  'circumcenter': ['circumcenter'],
  'incenter': ['incenter'],
  'centroid': ['centroid'],
  'inscribed': ['inscribed'],
  'tangent': ['tangent'],
  'secant': ['secant'],
  'chord': ['chord'],
  'arc': ['arc'],
};

function searchProofs(query) {
  if (!query.trim()) return { best: null, score: 0, all: [] };
  const ql = query.toLowerCase();

  // If query contains a term that should only match specific proofs,
  // zero out any proof whose title doesn't contain those terms
  const scored = PROOF_LIBRARY.map(p => {
    let s = scoreProof(p, query);
    // Check if query contains an exact-term key
    for (const [term, required] of Object.entries(PROOF_EXACT_TERMS)) {
      if (ql.includes(term)) {
        const titleLower = p.title.toLowerCase();
        const hasRequired = required.some(r => titleLower.includes(r));
        if (!hasRequired) s = 0; // zero out wrong proofs
      }
    }
    return { proof: p, score: s };
  });

  scored.sort((a, b) => b.score - a.score);
  // Require the top result to have at least 2 meaningful matching words
  // This prevents "angles" alone from matching every parallelogram theorem
  const best = scored[0];
  const meaningful = best.score > 0 ? countMeaningfulMatches(best.proof, query) : 0;
  // Single-word queries: only match if the score is very high (direct title/number match)
  // Multi-word queries: require 2+ meaningful words to match
  const queryWordCount = query.trim().split(/\s+/).filter(w => w.length > 2).length;
  const qualifies = best.score > 0 && (
    queryWordCount === 1 ? best.score >= 120 :    // single word: needs near-exact title match
    queryWordCount === 2 ? (best.score >= 100 || (best.score >= 80 && meaningful >= 2)) :  // two words
    (best.score >= 60 || meaningful >= 2)          // 3+ words: normal
  );
  return {
    best: qualifies ? best.proof : null,
    score: best.score,
    all: scored.filter(s => s.score > 0).slice(0, 6)
  };
}

// ── Chat: append message ─────────────────────────────
function appendMsg(role, htmlContent, animate = true) {
  const threadInner = document.getElementById('threadInner');
  if (!threadInner) return null;

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const avatarLabel = role === 'user' ? 'You' : '∠';
  const nameLabel = role === 'user' ? 'You' : 'ProofGPT';

  div.innerHTML = `
    <div class="msg-avatar">${avatarLabel}</div>
    <div class="msg-content">
      <div class="msg-name">${nameLabel}</div>
      <div class="msg-body">${htmlContent}</div>
    </div>`;

  threadInner.appendChild(div);
  scrollThread();
  return div;
}

// ── Chat: typing indicator ───────────────────────────
function showTyping() {
  const threadInner = document.getElementById('threadInner');
  if (!threadInner) return null;

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">∠</div>
    <div class="msg-content">
      <div class="msg-name">ProofGPT</div>
      <div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  threadInner.appendChild(div);
  scrollThread();
  return div;
}

function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}

// ── Scroll thread to bottom ──────────────────────────
function scrollThread() {
  const thread = document.getElementById('thread');
  if (thread) thread.scrollTop = thread.scrollHeight;
}

// ── Streaming text reveal ────────────────────────────
// Simulates the word-by-word reveal feel of ChatGPT/Claude
function streamText(container, text, onDone) {
  const words = text.split(' ');
  let i = 0;
  container.textContent = '';

  function next() {
    if (i >= words.length) { if (onDone) onDone(); return; }
    container.textContent += (i === 0 ? '' : ' ') + words[i];
    i++;
    scrollThread();
    // Vary speed slightly for natural feel
    setTimeout(next, 18 + Math.random() * 14);
  }
  next();
}

// ── Handle user send ─────────────────────────────────
function handleSend() {
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  if (sendBtn) sendBtn.disabled = true;

  appendMsg('user', `<p>${escHtml(text)}</p>`);

  const typing = showTyping();

  // Simulate a brief thinking delay then respond
  setTimeout(() => {
    removeTyping();
    respond(text);
    if (sendBtn) sendBtn.disabled = false;
  }, 420 + Math.random() * 200);
}

// ── Response logic ───────────────────────────────────
function respond(query) {
  const q = query.toLowerCase().trim();

  // ── Active proof session dialogue ──────────────────────
  if (typeof ProofSession !== 'undefined' && ProofSession.active) {
    if (/^(cancel|stop|quit|never mind|exit)\b/i.test(q)) {
      cancelProveSession();
    } else {
      handleProveDialogue(query);
    }
    return;
  }

  // Greetings
  if (/^(hi|hello|hey|sup|yo)\b/.test(q)) {
    streamingReply("Hey! Ask me anything — geometry proofs, arithmetic, algebra, logs, calculus, and more. Try \"prove the triangle sum theorem\", \"is a square a rectangle?\", or \"what are integrals?\"");
    return;
  }

  // Help
  if (/^(help|what can you do|what do you know)\b/.test(q)) {
    appendMsg('assistant', buildWelcomeCard());
    return;
  }

  // Browse geometry
  if (/\b(list|browse|show all|every theorem|all theorems|all postulates)\b/.test(q)) {
    appendMsg('assistant', '<p>Here are all the theorems and postulates from your proof book:</p>' + buildBrowser());
    return;
  }

  // ── 0. Reasoning engine — handles "is a square a rectangle?" etc ──
  const reasonResult = (typeof Reasoner !== 'undefined') ? Reasoner.reason(query) : null;
  if (reasonResult) {
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, 'Let me reason through that:', () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      cardEl.innerHTML = reasonResult;
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 1a. Geometry term lookup (vertical angles, linear pair, supplement, etc.) ──
  if (typeof GeoTerms !== 'undefined') {
    const termResult = GeoTerms.findTerm(query);
    if (termResult && GeoTerms.isTermQuery(q)) {
      const intro = `Here's ${termResult.term.title}:`;
      const msgEl = appendMsg('assistant', '<p></p>');
      const pEl = msgEl.querySelector('p');
      streamText(pEl, intro, () => {
        const cardEl = document.createElement('div');
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'translateY(8px)';
        cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardEl.innerHTML = GeoTerms.buildTermCard(termResult);
        msgEl.querySelector('.msg-body').appendChild(cardEl);
        scrollThread();
        requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
      });
      return;
    }
  }

  // ── 1. Prove request: always check first before any concept matching ──
  if (typeof isProveRequest !== 'undefined' && isProveRequest(query)) {
    // Check known proofs first
    const knownP = typeof findKnownProof !== 'undefined' ? findKnownProof(query) : null;
    if (knownP) {
      const intro = `Here's the ${knownP.proof.title}:`;
      const msgEl = appendMsg('assistant', '<p></p>');
      const pEl = msgEl.querySelector('p');
      streamText(pEl, intro, () => {
        const cardEl = document.createElement('div');
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'translateY(8px)';
        cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardEl.innerHTML = buildCustomProofCard(knownP.proof, currentFormat);
        msgEl.querySelector('.msg-body').appendChild(cardEl);
        scrollThread();
        requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
      });
      return;
    }

    // Check if the query itself contains an if-then — solve it directly
    const ifThenInQuery = query.match(/[Ii]f\s+.+?[,.]?\s+[Tt]hen\s+.+/);
    if (ifThenInQuery && typeof AutoProver !== 'undefined') {
      const name = extractTheoremName(query.replace(ifThenInQuery[0], '').trim()) || 'Custom Theorem';
      const autoProof = AutoProver.solveFromConditional(ifThenInQuery[0], name);
      if (autoProof) {
        const intro = `I can prove that. Here's the proof for "${autoProof.title}":`;
        const msgEl = appendMsg('assistant', '<p></p>');
        const pEl = msgEl.querySelector('p');
        streamText(pEl, intro, () => {
          const cardEl = document.createElement('div');
          cardEl.style.opacity = '0';
          cardEl.style.transform = 'translateY(8px)';
          cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          cardEl.innerHTML = buildCustomProofCard({
            title: autoProof.title,
            conditional: ifThenInQuery[0],
            given: autoProof.given,
            prove: autoProof.prove,
            diagramTopic: autoProof.diag,
            steps: autoProof.steps,
            explanation: autoProof.explanation,
          }, currentFormat);
          msgEl.querySelector('.msg-body').appendChild(cardEl);
          scrollThread();
          requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
        });
        return;
      }
    }

    // Start dialogue for unknown theorem
    const name = typeof extractTheoremName !== 'undefined' ? extractTheoremName(query) : query;
    ProofSession.active = true;
    ProofSession.step = 'awaiting_conditional';
    ProofSession.title = name ? name.charAt(0).toUpperCase() + name.slice(1) : 'Custom Theorem';
    ProofSession.rawInput = query;
    showProveDialogueCard(
      `Let's build a proof for <strong>${escHtml(ProofSession.title)}</strong>.`,
      `What is the <strong>if-then conditional statement</strong>? Write it in the form:<br>
       <code>"If [hypothesis], then [conclusion]"</code><br><br>
       Example: <em>"If two angles are vertical angles, then they are congruent."</em>`,
      [{ label: 'Cancel', action: 'cancel' }]
    );
    return;
  }

  
  // ── 2. If query is purely about a math concept ──
  if (isMathOnlyQuery(q)) {
    const conceptResult = MathBrain.findConcept(query);
    if (conceptResult) {
      const intro = `Here's how ${conceptResult.concept.title} works:`;
      const msgEl = appendMsg('assistant', '<p></p>');
      const pEl = msgEl.querySelector('p');
      streamText(pEl, intro, () => {
        const cardEl = document.createElement('div');
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'translateY(8px)';
        cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardEl.innerHTML = MathBrain.buildConceptCard(conceptResult.concept);
        msgEl.querySelector('.msg-body').appendChild(cardEl);
        scrollThread();
        requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
      });
      return;
    }
  }

  // ── 2. Try arithmetic computation ────────────────────
  const computed = MathBrain.tryCompute(query);
  if (computed) {
    const intro = `Let me work that out:`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(6px)';
      cardEl.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      cardEl.innerHTML = MathBrain.buildArithmeticCard(computed.expr, computed.result);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 2. Try geometry proof search ─────────────────────
  const proofResult = searchProofs(query);
  const fmt = currentFormat;

  if (proofResult.best && proofResult.score >= 40) {
    const intro = `Here's the ${proofResult.best.title} (${proofResult.best.number}):`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      cardEl.innerHTML = renderProofCard(proofResult.best, fmt);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 4. Try math concept search (fallback for non-geometry queries) ──
  const conceptResult = MathBrain.findConcept(query);
  if (conceptResult) {
    const intro = `Here's how ${conceptResult.concept.title} works:`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      cardEl.innerHTML = MathBrain.buildConceptCard(conceptResult.concept);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 4. Fuzzy geometry match ───────────────────────────
  if (proofResult.best && proofResult.score >= 15) {
    const alts = proofResult.all.slice(1, 4).map(r =>
      `<button class="hint-chip" onclick="quickSend('${r.proof.title.replace(/'/g, "\'")}')">
        ${escHtml(r.proof.title)}
      </button>`
    ).join('');
    const html = `
      <div class="fuzzy-banner">⚠️ Closest match — may not be exact.
        <div class="alts-row">${alts}</div>
      </div>
      ${renderProofCard(proofResult.best, fmt)}`;
    appendMsg('assistant', html);
    return;
  }

  // ── 5. Check built-in known proofs (triangle sum, pythagorean, etc.) ──
  if (typeof findKnownProof !== 'undefined') {
    const known = findKnownProof(query);
    if (known) {
      const intro = `Here's the ${known.proof.title}:`;
      const msgEl = appendMsg('assistant', '<p></p>');
      const pEl = msgEl.querySelector('p');
      streamText(pEl, intro, () => {
        const cardEl = document.createElement('div');
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'translateY(8px)';
        cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardEl.innerHTML = buildCustomProofCard(known.proof, currentFormat);
        msgEl.querySelector('.msg-body').appendChild(cardEl);
        scrollThread();
        requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
      });
      return;
    }
  }

  // ── 7. Not found ──────────────────────────────────────
  const html = `<p>I'm not sure about "<strong>${escHtml(query)}</strong>." You can:</p>
    <div class="welcome-chips" style="margin-top:12px;">
      <button class="hint-chip" onclick="quickSend('prove ' + ${JSON.stringify(query)})">Try proving it →</button>
      <button class="hint-chip" onclick="quickSend('how do parabolas work')">Parabolas</button>
      <button class="hint-chip" onclick="quickSend('what are derivatives')">Derivatives</button>
      <button class="hint-chip" onclick="quickSend('list all')">Geometry proofs →</button>
    </div>`;
  appendMsg('assistant', html);
}

// ── Streaming plain-text reply ────────────────────────
function streamingReply(text) {
  const msgEl = appendMsg('assistant', '<p></p>');
  const pEl = msgEl.querySelector('p');
  streamText(pEl, text);
}

// ── Quick send (from chips) ───────────────────────────
function quickSend(text) {
  const input = document.getElementById('input');
  if (input) { input.value = text; handleSend(); }
}

// ── Browse all ────────────────────────────────────────
function buildBrowser() {
  const chapters = {
    'Foundational Postulates': p => p.number.startsWith('P'),
    'Chapter 6 · Triangle Theorems': p => p.number.startsWith('6'),
    'Chapter 7 · Polygons & Parallelograms': p => p.number.startsWith('7'),
    'Chapter 8 · Similarity': p => p.number.startsWith('8'),
    'Chapter 10 · Circle Theorems': p => p.number.startsWith('10'),
  };

  let html = '<div class="theorem-browser">';
  for (const [label, filter] of Object.entries(chapters)) {
    const items = PROOF_LIBRARY.filter(filter);
    if (!items.length) continue;
    html += `<div class="chapter-group">
      <div class="chapter-label">${label}</div>
      <div class="chapter-chips">
        ${items.map(p =>
          `<button class="theorem-chip" onclick="quickSend('${p.title.replace(/'/g, "\'")}')">
            <span class="tnum">${p.number}</span> ${escHtml(p.title)}
          </button>`
        ).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

// ── Sidebar proof index ───────────────────────────────
function buildSidebarIndex() {
  const container = document.getElementById('proofIndex');
  if (!container) return;

  const chapters = {
    'Postulates': p => p.number.startsWith('P'),
    'Ch. 6 — Triangles': p => p.number.startsWith('6'),
    'Ch. 7 — Polygons': p => p.number.startsWith('7'),
    'Ch. 8 — Similarity': p => p.number.startsWith('8'),
    'Ch. 10 — Circles': p => p.number.startsWith('10'),
  };

  let html = '';
  for (const [label, filter] of Object.entries(chapters)) {
    const items = PROOF_LIBRARY.filter(filter);
    if (!items.length) continue;
    html += `<div class="idx-group-label">${label}</div>`;
    html += items.map(p =>
      `<button class="idx-item" onclick="quickSend('${p.title.replace(/'/g, "\'")}')">
        <span class="num">${p.number}</span>${escHtml(p.title)}
      </button>`
    ).join('');
  }
  container.innerHTML = html;
}

// ── Auto-resize textarea ──────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const isBuilder = document.querySelector('.builder-wrap') !== null;

  // Format toggle
  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.fmt;
    });
  });

  // Mobile hamburger
  const hb = document.getElementById('hamburger');
  const sb = document.getElementById('sidebar');
  if (hb && sb) {
    hb.addEventListener('click', () => sb.classList.toggle('open'));
    // Close sidebar on outside click
    document.addEventListener('click', e => {
      if (sb.classList.contains('open') && !sb.contains(e.target) && e.target !== hb) {
        sb.classList.remove('open');
      }
    });
  }

  if (!isBuilder) {
    // Chat page
    buildSidebarIndex();

    const sendBtn = document.getElementById('sendBtn');
    const input = document.getElementById('input');
    const newChatBtn = document.getElementById('newChatBtn');

    if (sendBtn) sendBtn.addEventListener('click', handleSend);
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      input.addEventListener('input', () => autoResize(input));
    }
    if (newChatBtn) {
      newChatBtn.addEventListener('click', () => {
        const ti = document.getElementById('threadInner');
        if (ti) ti.innerHTML = '';
        showWelcome();
      });
    }

    showWelcome();
  }
});

// ── Show welcome (chat page) ──────────────────────────
function showWelcome() {
  appendMsg('assistant', buildWelcomeCard(), false);
}
</script></body></html>

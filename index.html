<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProofGPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>/* ═══════════════════════════════════════════════════
   ProofGPT — Refined Chat UI
   Inspired by Claude / ChatGPT flow
   ═══════════════════════════════════════════════════ */

:root {
  /* Base */
  --bg:          #0f1117;
  --bg-surface:  #161b27;
  --bg-card:     #1c2235;
  --bg-input:    #1a1f2e;
  --bg-hover:    #222840;
  --bg-active:   #252c42;

  /* Borders */
  --border:      rgba(255,255,255,0.06);
  --border-md:   rgba(255,255,255,0.10);
  --border-hi:   rgba(255,255,255,0.16);

  /* Text */
  --tx-1:  #e9e8e3;
  --tx-2:  #9098b0;
  --tx-3:  #545d76;
  --tx-4:  #363d55;

  /* Accent — warm gold */
  --ac:        #d4af6a;
  --ac-dim:    rgba(212,175,106,0.12);
  --ac-glow:   rgba(212,175,106,0.06);

  /* Status */
  --green: #5cb85c;
  --red:   #e05c5c;

  /* Typography */
  --serif: 'Instrument Serif', Georgia, serif;
  --sans:  'Geist', system-ui, sans-serif;
  --mono:  'Geist Mono', 'Courier New', monospace;

  /* Layout */
  --sidebar-w: 252px;
  --topbar-h:  52px;
  --radius:    10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

/* ── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--tx-1); font-family: var(--sans); font-size: 15px; line-height: 1.6; overflow: hidden; }

/* ── Layout ─────────────────────────────────────── */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-top {
  padding: 18px 14px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 2px;
}

.brand-icon {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ac);
  line-height: 1;
}

.brand-name {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--tx-1);
  letter-spacing: -0.02em;
}

.new-chat-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}

.new-chat-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-hi);
  color: var(--tx-1);
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx-3);
  padding: 14px 16px 6px;
}

/* Format toggle */
.format-toggle {
  display: flex;
  gap: 4px;
  padding: 0 14px 10px;
}

.fmt-btn {
  flex: 1;
  padding: 7px 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--tx-3);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.fmt-btn:hover { border-color: var(--border-md); color: var(--tx-2); }

.fmt-btn.active {
  background: var(--ac-dim);
  border-color: rgba(212,175,106,0.3);
  color: var(--ac);
}

/* Proof index */
.proof-index {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.proof-index::-webkit-scrollbar { width: 3px; }
.proof-index::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.idx-item, .idx-group {
  display: block;
  width: 100%;
  background: none;
  border: none;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12.5px;
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: background 0.12s, color 0.12s;
}

.idx-item:hover { background: var(--bg-hover); color: var(--tx-1); }
.idx-item .num { font-family: var(--mono); font-size: 10.5px; color: var(--ac); margin-right: 6px; }

.idx-group-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--tx-4);
  padding: 10px 8px 4px;
}

/* Sidebar bottom */
.sidebar-bottom {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11.5px;
  color: var(--tx-3);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 5px var(--green);
}

/* ── Main area ───────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Topbar ──────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--tx-3);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  transition: color 0.15s;
}

.hamburger:hover { color: var(--tx-1); }

.topbar-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--tx-2);
  flex: 1;
}

.topbar-link {
  font-size: 12.5px;
  color: var(--tx-3);
  text-decoration: none;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}

.topbar-link:hover { color: var(--tx-2); border-color: var(--border-md); }

/* ── Thread (chat scroll area) ───────────────────── */
.thread {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.thread::-webkit-scrollbar { width: 4px; }
.thread::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.thread-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Message ─────────────────────────────────────── */
.msg {
  display: flex;
  gap: 14px;
  padding: 18px 0;
  animation: msgIn 0.22s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* No visual separator between messages — just space */
.msg + .msg {
  border-top: 1px solid var(--border);
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  margin-top: 1px;
}

.msg.user .msg-avatar {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  color: var(--tx-2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.msg.assistant .msg-avatar {
  background: var(--ac-dim);
  border: 1px solid rgba(212,175,106,0.2);
  color: var(--ac);
  font-family: var(--serif);
  font-size: 15px;
}

.msg-content {
  flex: 1;
  min-width: 0;
  padding-top: 3px;
}

.msg-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--tx-3);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.msg-body {
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--tx-1);
}

.msg-body p { margin-bottom: 0.65em; }
.msg-body p:last-child { margin-bottom: 0; }

/* User message body slightly different */
.msg.user .msg-body {
  color: var(--tx-2);
  font-size: 14px;
}

/* ── Typing indicator ────────────────────────────── */
.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 4px 0;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--tx-3);
  border-radius: 50%;
  animation: typingBounce 1.3s infinite ease-in-out;
}

.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── Proof card ──────────────────────────────────── */
.proof-card {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 12px;
}

.proof-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-active);
}

.proof-card-title {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--tx-1);
}

.proof-card-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ac);
  background: var(--ac-dim);
  border: 1px solid rgba(212,175,106,0.2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* Proof sections */
.proof-section {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.proof-section:last-child { border-bottom: none; }

.proof-section-lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.proof-conditional {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--tx-1);
  line-height: 1.65;
  padding: 10px 14px;
  background: var(--ac-glow);
  border-left: 2px solid var(--ac);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.proof-given {
  font-size: 13.5px;
  color: var(--tx-2);
  line-height: 1.7;
}

.proof-given li { list-style: none; padding: 2px 0; }
.proof-given li::before { content: "·"; color: var(--ac); margin-right: 8px; }

/* Diagram */
.proof-diagram-wrap {
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 18px;
  display: flex;
  justify-content: center;
}

.proof-diagram-wrap svg { max-width: 100%; height: auto; }

/* Two-column table */
.proof-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.proof-table th {
  padding: 7px 12px;
  text-align: left;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tx-3);
  border-bottom: 1px solid var(--border);
}

.proof-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.55;
}

.proof-table tr:last-child td { border-bottom: none; }

.proof-table td:first-child { width: 30px; color: var(--tx-4); font-size: 11px; }
.proof-table td:nth-child(2) { font-family: var(--mono); font-size: 12px; color: var(--tx-1); }
.proof-table td:last-child { color: var(--tx-2); font-size: 12px; }

/* Paragraph proof */
.proof-para {
  font-size: 14px;
  line-height: 1.85;
  color: var(--tx-1);
}

.proof-para p { margin-bottom: 0.7em; }

/* Explanation box */
.proof-explanation {
  font-size: 13.5px;
  color: var(--tx-2);
  line-height: 1.75;
}

/* ── Welcome card ────────────────────────────────── */
.welcome-card {
  padding: 6px 0 16px;
}

.welcome-greeting {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--tx-1);
  margin-bottom: 8px;
}

.welcome-sub {
  font-size: 14px;
  color: var(--tx-2);
  line-height: 1.7;
  margin-bottom: 16px;
}

.welcome-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.hint-chip {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12.5px;
  padding: 6px 13px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.hint-chip:hover {
  background: var(--bg-hover);
  border-color: var(--ac);
  color: var(--ac);
}

/* ── All theorems browser ────────────────────────── */
.theorem-browser { display: flex; flex-direction: column; gap: 18px; margin-top: 8px; }

.chapter-group { }

.chapter-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.chapter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.theorem-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--tx-2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}

.theorem-chip:hover {
  border-color: var(--ac);
  color: var(--ac);
  background: var(--ac-dim);
}

.theorem-chip .tnum {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ac);
  opacity: 0.8;
}

/* ── Fuzzy warning ───────────────────────────────── */
.fuzzy-banner {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 12.5px;
  color: var(--tx-2);
  background: rgba(212,175,106,0.07);
  border: 1px solid rgba(212,175,106,0.18);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 12px;
  line-height: 1.6;
}

.alts-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 5px;
}

/* ── Composer ────────────────────────────────────── */
.composer-wrap {
  padding: 12px 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.composer {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  padding: 10px 10px 10px 16px;
  transition: border-color 0.15s;
}

.composer:focus-within {
  border-color: rgba(212,175,106,0.4);
}

.composer-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--tx-1);
  font-family: var(--sans);
  font-size: 14.5px;
  line-height: 1.6;
  resize: none;
  max-height: 160px;
  padding: 2px 0;
}

.composer-input::placeholder { color: var(--tx-4); }

.composer-send {
  width: 34px;
  height: 34px;
  background: var(--ac);
  border: none;
  border-radius: 8px;
  color: #0f1117;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}

.composer-send:hover { opacity: 0.88; transform: translateY(-1px); }
.composer-send:active { transform: translateY(0); }
.composer-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.composer-hints {
  max-width: 720px;
  margin: 8px auto 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ── Builder page ────────────────────────────────── */
.builder-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.builder-search {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.search-row {
  max-width: 720px;
  display: flex;
  gap: 10px;
}

.search-input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: var(--radius);
  color: var(--tx-1);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 16px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: rgba(212,175,106,0.4); }
.search-input::placeholder { color: var(--tx-4); }

.search-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 11px 18px;
  background: var(--ac);
  border: none;
  border-radius: var(--radius);
  color: #0f1117;
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}

.search-btn:hover { opacity: 0.9; }

.builder-result {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.builder-result::-webkit-scrollbar { width: 4px; }
.builder-result::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.builder-empty {
  max-width: 480px;
  margin: 60px auto;
  text-align: center;
}

.builder-empty-icon {
  font-family: var(--serif);
  font-size: 48px;
  color: var(--border-hi);
  margin-bottom: 18px;
}

.builder-empty p {
  font-size: 14px;
  color: var(--tx-3);
  line-height: 1.7;
  margin-bottom: 6px;
}

.builder-count { font-size: 12.5px !important; color: var(--tx-4) !important; }

/* Full proof layout (builder page) */
.full-proof-wrap { max-width: 720px; }

.full-proof-header {
  margin-bottom: 20px;
}

.full-proof-title {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--tx-1);
  margin-bottom: 4px;
  line-height: 1.25;
}

.full-proof-meta {
  font-size: 12px;
  color: var(--tx-3);
}

.full-proof-section {
  margin-bottom: 20px;
}

.full-proof-section-lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 8px;
}

.no-result {
  max-width: 480px;
  margin: 40px auto;
  text-align: center;
  color: var(--tx-3);
  font-size: 14px;
  line-height: 1.8;
}

.no-result strong { color: var(--tx-2); }
.no-result code {
  background: var(--bg-active);
  border: 1px solid var(--border-md);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ac);
}

/* ── Responsive ──────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 200;
    transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,0.5);
  }

  .sidebar.open { transform: translateX(0); }
  .hamburger { display: flex; }
  .composer-hints { display: none; }
}

/* ── Print ───────────────────────────────────────── */
@media print {
  .sidebar, .topbar, .builder-search, .composer-wrap { display: none !important; }
  body { background: white; color: black; overflow: visible; }
  .layout, .main { height: auto; overflow: visible; }
}

/* ── Math Cards ──────────────────────────────────────── */
.math-card {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 12px;
}

.math-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-active);
}

.math-card-title {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--tx-1);
}

.math-card-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--blue, #6b93d6);

<script>
const PROOF_LIBRARY = [

  // ═══════════════════════════════════════════════════
  // FOUNDATIONAL POSTULATES
  // ═══════════════════════════════════════════════════

  {
    id: "ruler-postulate",
    number: "P1",
    title: "Ruler Postulate",
    keywords: ["ruler", "ruler postulate", "number line", "distance", "coordinate"],
    conditional: "If two points are on a line, then there is a one-to-one correspondence between the points and real numbers so that the distance between any two points equals the absolute value of the difference of their coordinates.",
    given: ["Points A and B on a line", "Coordinates a and b on a number line"],

    diagramTopic: "ruler",

    proof: {
      format: "two-column",
      steps: [
        { statement: "A and B are points on a line with coordinates a and b", reason: "Given" },
        { statement: "Each point corresponds to exactly one real number", reason: "Ruler Postulate (one-to-one correspondence)" },
        { statement: "AB = |a − b|", reason: "Ruler Postulate (distance = absolute value of difference of coordinates)" }
      ]
    },
    explanation: "The Ruler Postulate lets us measure distances on a line just like measuring with a ruler. Every point gets a number, and the distance between two points is just the absolute value of subtracting their numbers."
  },

  {
    id: "segment-addition",
    number: "P2",
    title: "Segment Addition Postulate",
    keywords: ["segment addition", "between", "part whole segment", "collinear"],

    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "B is between A and C on line AC", reason: "Given" },
        { statement: "AB and BC are parts of AC", reason: "Definition of betweenness" },
        { statement: "AB + BC = AC", reason: "Segment Addition Postulate" }
      ]
    },
    explanation: "If a point sits between two other points on a line, the two smaller distances add up to the total distance. Simple but used constantly in geometry proofs."
  },

  {
    id: "protractor-postulate",
    number: "P3",
    title: "Protractor Postulate",
    keywords: ["protractor", "protractor postulate", "angle measure", "ray correspondence"],
    conditional: "If a ray OA is on one side of a line, then there is a one-to-one correspondence between all rays from O and real numbers from 0 to 180 so that the measure of an angle equals the absolute value of the difference of its ray coordinates.",
    given: ["Ray OA and Ray OB from point O"],
    prove: "m∠AOB = |a − b| where a and b are the coordinates of the rays",
    diagramTopic: "linear pair",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Rays OA and OB from point O with ray coordinates a and b", reason: "Given" },
        { statement: "Each ray from O corresponds to exactly one number 0–180", reason: "Protractor Postulate" },
        { statement: "m∠AOB = |a − b|", reason: "Protractor Postulate (angle measure = absolute difference of ray coordinates)" }
      ]
    },
    explanation: "The Protractor Postulate is for angles what the Ruler Postulate is for segments. Every ray gets assigned a number 0–180, and the angle between two rays is the absolute difference of their numbers — just like reading a protractor."
  },

  {
    id: "angle-addition",
    number: "P4",
    title: "Angle Addition Postulate",
    keywords: ["angle addition", "interior ray", "angle parts", "add angles"],
    conditional: "If ray OB is in the interior of angle AOC, then m∠AOB + m∠BOC = m∠AOC.",
    given: ["∠AOC", "Ray OB is in the interior of ∠AOC"],
    prove: "m∠AOB + m∠BOC = m∠AOC",
    diagramTopic: "linear pair",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Ray OB is in the interior of ∠AOC", reason: "Given" },
        { statement: "∠AOB and ∠BOC are adjacent angles that together form ∠AOC", reason: "Definition of interior of an angle" },
        { statement: "m∠AOB + m∠BOC = m∠AOC", reason: "Angle Addition Postulate" }
      ]
    },
    explanation: "Just like Segment Addition, if a ray splits an angle into two parts, those two parts add up to the whole angle. Used all the time when angle bisectors or extra lines are drawn inside angles."
  },

  {
    id: "two-point-postulate",
    number: "P5",
    title: "Two-Point Postulate",
    keywords: ["two point", "two points", "unique line", "exactly one line"],
    conditional: "Through any two points, there exists exactly one line.",
    given: ["Two distinct points A and B"],
    prove: "Exactly one line passes through A and B",
    diagramTopic: "two-point line",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "A and B are two distinct points", reason: "Given" },
        { statement: "At least one line passes through A and B", reason: "Two-Point Postulate (existence)" },
        { statement: "No other line can pass through both A and B", reason: "Two-Point Postulate (uniqueness)" },
        { statement: "Exactly one line passes through A and B", reason: "Combining existence and uniqueness" }
      ]
    },
    explanation: "Two dots always determine exactly one straight line connecting them — no more, no less. This seems obvious but it's a foundational rule geometry is built on."
  },

  {
    id: "line-point-postulate",
    number: "P6",
    title: "Line-Point Postulate",
    keywords: ["line point", "two points on line", "line contains"],
    conditional: "A line contains at least two points.",

    prove: "Line l contains at least two distinct points",
    diagramTopic: "two-point line",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Line l exists", reason: "Given" },
        { statement: "Line l extends infinitely in both directions", reason: "Definition of a line" },
        { statement: "Line l contains at least two distinct points", reason: "Line-Point Postulate" }
      ]
    },
    explanation: "A line isn't a line unless it has at least two points on it. In fact, a line has infinitely many points — but we only need to guarantee at least two."
  },

  {
    id: "line-intersection-postulate",
    number: "P7",
    title: "Line Intersection Postulate",
    keywords: ["line intersection", "two lines intersect", "intersection point", "lines meet"],
    conditional: "If two lines intersect, then they intersect at exactly one point.",
    given: ["Line l and line m intersect"],
    prove: "Lines l and m intersect at exactly one point",
    diagramTopic: "vertical angle",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Line l and line m intersect", reason: "Given" },
        { statement: "They share at least one common point P", reason: "Definition of intersection" },
        { statement: "Assume they share a second point Q", reason: "Assumption for contradiction" },
        { statement: "Two points P and Q determine exactly one line", reason: "Two-Point Postulate" },
        { statement: "But l and m would be the same line — contradiction", reason: "Given that l and m are distinct lines" },
        { statement: "Therefore l and m intersect at exactly one point", reason: "Indirect proof" }
      ]
    },
    explanation: "When two different straight lines cross, they can only meet at one single point. If they shared two points, they'd have to be the same line — which contradicts them being two different lines."
  },

  {
    id: "three-point-postulate",
    number: "P8",
    title: "Three-Point Postulate",
    keywords: ["three point", "three points", "plane", "noncollinear", "determine plane"],
    conditional: "Through any three noncollinear points, there exists exactly one plane.",
    given: ["Three noncollinear points A, B, and C"],

    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "A, B, and C are three noncollinear points", reason: "Given" },
        { statement: "A, B, C do not all lie on one line", reason: "Definition of noncollinear" },
        { statement: "At least one plane contains all three points", reason: "Three-Point Postulate (existence)" },
        { statement: "No other plane contains all three points", reason: "Three-Point Postulate (uniqueness)" },
        { statement: "Exactly one plane contains A, B, and C", reason: "Combining existence and uniqueness" }
      ]
    },
    explanation: "Three points that aren't all in a line pin down exactly one flat surface (plane). Think of a camera tripod — three legs always sit stably on one flat plane, but four legs can wobble."
  },

  {
    id: "plane-point-postulate",
    number: "P9",
    title: "Plane-Point Postulate",
    keywords: ["plane point", "plane contains", "points in plane"],
    conditional: "A plane contains at least three noncollinear points.",
    given: ["Plane P"],
    prove: "Plane P contains at least three noncollinear points",
    diagramTopic: "three-point plane",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Plane P exists", reason: "Given" },
        { statement: "A plane is a flat surface extending infinitely", reason: "Definition of a plane" },
        { statement: "Plane P contains at least three noncollinear points", reason: "Plane-Point Postulate" }
      ]
    },
    explanation: "A plane always has at least three points that aren't all in a line. You need at least three noncollinear points to even define a plane in the first place."
  },

  {
    id: "plane-line-postulate",
    number: "P10",
    title: "Plane-Line Postulate",
    keywords: ["plane line", "two points same plane", "line in plane"],
    conditional: "If two points lie in a plane, then the line containing those points lies in the plane.",
    given: ["Plane P", "Points A and B both lie in plane P"],
    prove: "Line AB lies entirely in plane P",
    diagramTopic: "two-point line",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Points A and B both lie in plane P", reason: "Given" },
        { statement: "Line AB is the unique line through A and B", reason: "Two-Point Postulate" },
        { statement: "Line AB lies entirely in plane P", reason: "Plane-Line Postulate" }
      ]
    },
    explanation: "If two points are on a flat surface, the entire line connecting them is also on that flat surface. A line can't partially stick out of a plane if both its points are in it."
  },

  {
    id: "plane-intersection-postulate",
    number: "P11",
    title: "Plane Intersection Postulate",
    keywords: ["plane intersection", "two planes", "planes intersect", "line of intersection"],
    conditional: "If two planes intersect, then they intersect in exactly one line.",
    given: ["Plane P and Plane Q intersect"],
    prove: "Planes P and Q intersect in exactly one line",
    diagramTopic: "three-point plane",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "Plane P and Plane Q intersect", reason: "Given" },
        { statement: "They share at least one common point", reason: "Definition of intersection" },
        { statement: "They share at least two common points (a plane has infinitely many points)", reason: "Plane-Point Postulate" },
        { statement: "Two points determine exactly one line", reason: "Two-Point Postulate" },
        { statement: "P and Q intersect in exactly one line", reason: "Plane Intersection Postulate" }
      ]
    },
    explanation: "When two flat surfaces (planes) cross each other, they always meet along a straight line — like how two walls of a room meet at a line in the corner."
  },

  {
    id: "linear-pair-postulate",
    number: "P12",
    title: "Linear Pair Postulate",
    keywords: ["linear pair", "supplementary", "180 degrees", "straight line angles"],
    conditional: "If two angles form a linear pair, then they are supplementary and their measures add up to 180°.",
    given: ["∠ABC and ∠CBD form a linear pair"],
    prove: "m∠ABC + m∠CBD = 180°",
    diagramTopic: "linear pair",
    category: "postulate",
    proof: {
      format: "two-column",
      steps: [
        { statement: "∠ABC and ∠CBD form a linear pair", reason: "Given" },
        { statement: "Ray BA and Ray BD are opposite rays", reason: "Definition of linear pair" },
        { statement: "Ray BA and Ray BD form a straight angle of 180°", reason: "Definition of straight angle" },
        { statement: "m∠ABC + m∠CBD = 180°", reason: "Angle Addition Postulate and Linear Pair Postulate" }
      ]
    },
    explanation: "A linear pair is two angles that sit side by side and together make a straight line. Since a straight line is 180°, a linear pair always adds up to 180° — they're supplementary by definition."
  },

  {
    id: "parallel-postulate",
    number: "P13",
    title: "Parallel Postulate",
    keywords: ["parallel postulate", "one parallel", "parallel through point", "unique parallel"],
    conditional: "Through a point not on a line, there is exactly one line parallel to the given line.",

  {

    number: "P14",
    title: "Perpendicular Postulate",
    keywords: ["perpendicular postulate", "one perpendicular", "perpendicular through point", "unique perpendicular"],
    conditional: "Through a point not on a line, there is exactly one line perpendicular to the given line.",
    given: ["Line l", "Point P not on line l"],
    prove: "Exactly one line through P is perpendicular to l",

  },

  {

    title: "Side-Side-Side (SSS) Congruence Postulate",

  {

    title: "Side-Angle-Side (SAS) Congruence Postulate",

    number: "P17",

    prove: "△ABC ≅ △DEF",
    diagramTopic: "ASA congruence postulate",

const DiagramRenderer = {
  C: {

  poly(pts,fill,stroke,sw){const d=pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ')+'Z';return `<path d="${d}" fill="${fill||this.C.fill}" stroke="${stroke||this.C.stroke}" stroke-width="${sw||1.8}"/>`;},
  circ(cx,cy,r,fill,stroke,sw){return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill||this.C.fill}" stroke="${stroke||this.C.stroke}" stroke-width="${sw||1.8}"/>`;},

  ticks(x1,y1,x2,y2,n,col){col=col||this.C.stroke;const cx=(x1+x2)/2,cy=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),nx=-dy/len*7,ny=dx/len*7,ax=dx/len,ay=dy/len,gap=5,start=-(n-1)*gap/2;let s='';for(let i=0;i<n;i++){const o=start+i*gap;s+=`<line x1="${cx+ax*o+nx}" y1="${cy+ay*o+ny}" x2="${cx+ax*o-nx}" y2="${cy+ay*o-ny}" stroke="${col}" stroke-width="1.5" opacity="0.85"/>`;}return s;},
  arc(cx,cy,r,a1,a2,col,sw){const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);let da=a2-a1;while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;const sw2=da>0?1:0,lg=Math.abs(da)>Math.PI?1:0;return `<path d="M${x1},${y1} A${r},${r} 0 ${lg},${sw2} ${x2},${y2}" fill="none" stroke="${col||this.C.blue}" stroke-width="${sw||1.4}" opacity="0.8"/>`;},

  dCircumcenter(){

    s+=this.poly([A,B,Cv],C.fill,C.stroke);
    const mAB=[(A[0]+B[0])/2,(A[1]+B[1])/2],mBC=[(B[0]+Cv[0])/2,(B[1]+Cv[1])/2],mAC=[(A[0]+Cv[0])/2,(A[1]+Cv[1])/2];
    s+=this.seg(mAB[0],mAB[1],O[0],O[1],C.blue,1.2,'4,3');

    s+=this.seg(O[0],O[1],B[0],B[1],C.green,1.4);

    s+=this.ticks(O[0],O[1],A[0],A[1],1,C.green);
    s+=this.ticks(O[0],O[1],B[0],B[1],1,C.green);
    s+=this.ticks(O[0],O[1],Cv[0],Cv[1],1,C.green);
    s+=this.dot(A[0],A[1])+this.lbl(A[0]-14,A[1]+4,'A');

  dParallelLines(){

// ── Safe arithmetic evaluator ────────────────────────────────────
const MathEval = {

  // Evaluate a safe arithmetic/math expression
  evaluate(expr) {
    // Clean up input
    let e = expr.trim()
      .replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**')
      .replace(/\bpi\b/gi, 'Math.PI').replace(/\bπ\b/g, 'Math.PI')
      .replace(/\be\b/g, 'Math.E')
      .replace(/\bsqrt\b/gi, 'Math.sqrt').replace(/√(\d+)/g, 'Math.sqrt($1)')
      .replace(/\babs\b/gi, 'Math.abs')
      .replace(/\bsin\b/gi, 'Math.sin').replace(/\bcos\b/gi, 'Math.cos')
      .replace(/\btan\b/gi, 'Math.tan').replace(/\blog\b/gi, 'Math.log10')
      .replace(/\bln\b/gi, 'Math.log').replace(/\bfloor\b/gi, 'Math.floor')
      .replace(/\bceil\b/gi, 'Math.ceil').replace(/\bround\b/gi, 'Math.round')
      .replace(/\bpow\b/gi, 'Math.pow');

    // Only allow safe characters
    if (!/^[\d\s\+\-\*\/\.\(\)\%\!Math\.PIEA-Za-z_]+$/.test(e)) return null;
    if (/\b(window|document|eval|Function|fetch|import|require|process)\b/.test(e)) return null;

    try {
      const result = Function('"use strict"; return (' + e + ')')();
      if (typeof result !== 'number' || !isFinite(result)) return null;
      // Format nicely
      if (Number.isInteger(result)) return result.toString();
      const rounded = Math.round(result * 1e10) / 1e10;
      return rounded.toString();
    } catch { return null; }
  },

  // Check if a string looks like a math expression to evaluate
  isExpression(q) {
    // Has operators and numbers, looks computational
    if (!/\b(what|how|why|explain|tell|show|describe|define)\b/i.test(q)) {
      // Direct operators
      if (/[\d].*[\+\-\*\/\^]|[\+\-\*\/\^].*[\d]/.test(q) && /\d/.test(q)) return true;
      // Math functions applied to numbers
      if (/\b(sqrt|abs|sin|cos|tan|log|ln|floor|ceil|round)\s*\(?\d/.test(q)) return true;
      // √ symbol
      if (/√\d/.test(q)) return true;
    }
    return false;
  },

  // Format the answer with step-by-step for simple operations
  formatAnswer(expr, result, original) {
    const ops = {
      add: /(\d[\d\s]*)\s*\+\s*([\d\s]*\d)/,
      sub: /(\d[\d\s]*)\s*-\s*([\d\s]*\d)/,
      mul: /(\d[\d\s]*)\s*[\*×]\s*([\d\s]*\d)/,
      div: /(\d[\d\s]*)\s*[\/÷]\s*([\d\s]*\d)/,
      pow: /(\d[\d\s]*)\s*[\*\*\^]\s*([\d\s]*\d)/,
    };

    const clean = original.replace(/\s+/g, ' ').trim();
    return `<div class="math-answer">
      <div class="math-expr">${escHtml(clean)} = <span class="math-result">${escHtml(result)}</span></div>
    </div>`;
  }
};

      else if (kw.includes(ql) && ql.length > 3) score += 20;
      else {
        const kwWords = kw.split(/\s+/);
        const qWords = ql.split(/\s+/).filter(w => w.length > 2);
        for (const qw of qWords) {
          for (const kw2 of kwWords) {
            if (kw2.includes(qw) || qw.includes(kw2)) score += 8;
          }
        }
      }
    }
    return score;
  },

  // Find best matching concept
  findConcept(query) {
    let best = null, bestScore = 0;
    for (const c of MATH_CONCEPTS) {
      const s = this.scoreConcept(c, query);
      if (s > bestScore) { bestScore = s; best = c; }
    }
    return bestScore >= 12 ? { concept: best, score: bestScore } : null;
  },

  // Try to compute arithmetic
  tryCompute(query) {
    // Strip trailing punctuation and question words
    const clean = query
      .replace(/[?!.]+$/, '')
      .replace(/^(what\s+is|calculate|compute|evaluate|solve|find|what'?s)\s+/i, '')
      .replace(/\s*=\s*\??\s*$/, '')
      .trim();

    if (MathEval.isExpression(clean)) {
      const result = MathEval.evaluate(clean);
      if (result !== null) return { expr: clean, result };
    }
    return null;
  },

  // Build the response HTML for a concept
  buildConceptCard(concept) {
    return `<div class="math-card">
      <div class="math-card-head">
        <span class="math-card-title">${concept.title}</span>
        <span class="math-card-badge">${concept.tags[0]}</span>
      </div>
      <div class="math-card-body">
        ${concept.explain()}
      </div>
    </div>`;
  },

  // Build arithmetic answer card
  buildArithmeticCard(expr, result) {
    // Generate step-by-step for simple ops if possible
    const steps = this.getSteps(expr, result);
    return `<div class="math-card">
      <div class="math-card-head">
        <span class="math-card-title">Calculation</span>
        <span class="math-card-badge">arithmetic</span>
      </div>
      <div class="math-card-body">
        <div class="math-answer-big">
          <span class="math-expr-text">${escHtml(expr)}</span>
          <span class="math-equals"> = </span>
          <span class="math-result-big">${escHtml(result)}</span>
        </div>
        ${steps ? `<div class="math-steps">${steps}</div>` : ''}
      </div>
    </div>`;
  },

  getSteps(expr, result) {
    const e = expr.replace(/\s+/g,'');
    // Simple single operation
    const add = e.match(/^(-?\d+(?:\.\d+)?)\+(-?\d+(?:\.\d+)?)$/);
    const sub = e.match(/^(-?\d+(?:\.\d+)?)-(-?\d+(?:\.\d+)?)$/);
    const mul = e.match(/^(-?\d+(?:\.\d+)?)\*(-?\d+(?:\.\d+)?)$/);
    const div = e.match(/^(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)$/);
    const pow = e.match(/^(-?\d+(?:\.\d+)?)\*\*(-?\d+(?:\.\d+)?)$/);

    if (add) return `<p class="math-step">Adding ${add[1]} and ${add[2]}: ${add[1]} + ${add[2]} = <strong>${result}</strong></p>`;
    if (sub) return `<p class="math-step">Subtracting ${sub[2]} from ${sub[1]}: ${sub[1]} − ${sub[2]} = <strong>${result}</strong></p>`;
    if (mul) return `<p class="math-step">Multiplying ${mul[1]} × ${mul[2]} = <strong>${result}</strong></p>`;
    if (div) {
      const n = parseFloat(div[1]), d = parseFloat(div[2]);
      return `<p class="math-step">${n} ÷ ${d} = <strong>${result}</strong>${Number.isInteger(n/d) ? '' : ` ≈ ${(n/d).toFixed(4)}`}</p>`;
    }
    if (pow) return `<p class="math-step">${pow[1]} raised to the power ${pow[2]} = <strong>${result}</strong></p>`;

    // Multi-step PEMDAS breakdown
    return `<p class="math-step">Evaluated using order of operations (PEMDAS): <strong>${result}</strong></p>`;
  },

  // Is this query math-related at all?
  isMathQuery(q) {
    const ql = q.toLowerCase();
    const mathWords = ['math', 'calculate', 'compute', 'solve', 'equation', 'formula',
      'number', 'algebra', 'calculus', 'trig', 'log', 'sin', 'cos', 'tan',
      'derivative', 'integral', 'limit', 'function', 'graph', 'slope', 'intercept',
      'quadratic', 'parabola', 'exponent', 'fraction', 'percent', 'prime', 'factor',
      'probability', 'statistic', 'mean', 'median', 'sequence', 'series', 'imaginary',
      'pythagorean', 'hypotenuse', '1+1', 'plus', 'minus', 'times', 'divided',
      'squared', 'cubed', 'root', 'absolute value', 'inequality', 'variable'];
    return mathWords.some(w => ql.includes(w)) ||
           /[\d]/.test(q) && /[\+\-\*\/\^\%]/.test(q);
  }
};

// ── Active format ────────────────────────────────────
let currentFormat = 'two-column';

// ── Escape HTML ──────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Pure math query guard ─────────────────────────────
const MATH_ONLY_TERMS = [
  'log','logarithm','logarithms','ln','natural log',
  'integral','integrals','integrate','antiderivative',
  'derivative','differentiate','differentiation',
  'calculus','limit','limits',
  'parabola','parabolas',
  'exponent','exponential',
  'probability','statistics','mean','median','mode',
  'imaginary','complex number',
  'percent','percentage','fraction',
  'trig','sine','cosine','tangent','soh cah toa',
  'radian','unit circle',
  'sequence','series',
  'absolute value',
];

function isMathOnlyQuery(q) {
  const ql = q.toLowerCase();
  return MATH_ONLY_TERMS.some(term => {
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = new RegExp('(^|\\s)' + escaped + '(\\s|$|s\\b)');
    return re.test(ql);
  });
}

// ── Search engine ────────────────────────────────────
function scoreProof(proof, query) {
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/).filter(w => w.length > 1);
  let score = 0;

  if (proof.title.toLowerCase() === q) score += 200;
  if (proof.title.toLowerCase().includes(q)) score += 100;
  if (proof.number && q === proof.number) score += 150;
  if (proof.number && q.includes(proof.number)) score += 90;

  for (const kw of proof.keywords) {
    const kwl = kw.toLowerCase();
    if (q.includes(kwl)) score += 60;
    if (kwl.includes(q) && q.length >= 5) score += 40;
    for (const w of words) {
      if (w.length >= 4) {
        const re = new RegExp('(^|[^a-z])' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '([^a-z]|$)');
        if (re.test(kwl)) score += 12;
      } else if (kwl === w || kwl.startsWith(w+' ') || kwl.endsWith(' '+w) || kwl.includes(' '+w+' ')) {
        score += 12;
      }
    }
  }

  for (const w of words) {
    if (w.length >= 4 && proof.title.toLowerCase().includes(w)) score += 18;
  }

  if (q.includes('postulate') && proof.category === 'postulate') score += 12;
  if (q.includes('theorem') && proof.category === 'theorem') score += 12;

  return score;
}

function searchProofs(query) {
  if (!query.trim()) return { best: null, score: 0, all: [] };
  const scored = PROOF_LIBRARY.map(p => ({ proof: p, score: scoreProof(p, query) }));
  scored.sort((a, b) => b.score - a.score);
  return {
    best: scored[0].score > 0 ? scored[0].proof : null,
    score: scored[0].score,
    all: scored.filter(s => s.score > 0).slice(0, 6)
  };
}

// ── Chat: append message ─────────────────────────────
function appendMsg(role, htmlContent, animate = true) {
  const threadInner = document.getElementById('threadInner');
  if (!threadInner) return null;

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const avatarLabel = role === 'user' ? 'You' : '∠';
  const nameLabel = role === 'user' ? 'You' : 'ProofGPT';

  div.innerHTML = `
    <div class="msg-avatar">${avatarLabel}</div>
    <div class="msg-content">
      <div class="msg-name">${nameLabel}</div>
      <div class="msg-body">${htmlContent}</div>
    </div>`;

  threadInner.appendChild(div);
  scrollThread();
  return div;
}

// ── Chat: typing indicator ───────────────────────────
function showTyping() {
  const threadInner = document.getElementById('threadInner');
  if (!threadInner) return null;

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">∠</div>
    <div class="msg-content">
      <div class="msg-name">ProofGPT</div>
      <div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  threadInner.appendChild(div);
  scrollThread();
  return div;
}

function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}

// ── Scroll thread to bottom ──────────────────────────
function scrollThread() {
  const thread = document.getElementById('thread');
  if (thread) thread.scrollTop = thread.scrollHeight;
}

// ── Streaming text reveal ────────────────────────────
// Simulates the word-by-word reveal feel of ChatGPT/Claude
function streamText(container, text, onDone) {
  const words = text.split(' ');
  let i = 0;
  container.textContent = '';

  function next() {
    if (i >= words.length) { if (onDone) onDone(); return; }
    container.textContent += (i === 0 ? '' : ' ') + words[i];
    i++;
    scrollThread();
    // Vary speed slightly for natural feel
    setTimeout(next, 18 + Math.random() * 14);
  }
  next();
}

// ── Handle user send ─────────────────────────────────
function handleSend() {
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  if (sendBtn) sendBtn.disabled = true;

  appendMsg('user', `<p>${escHtml(text)}</p>`);

  const typing = showTyping();

  // Simulate a brief thinking delay then respond
  setTimeout(() => {
    removeTyping();
    respond(text);
    if (sendBtn) sendBtn.disabled = false;
  }, 420 + Math.random() * 200);
}

// ── Response logic ───────────────────────────────────
function respond(query) {
  const q = query.toLowerCase().trim();

  // Greetings
  if (/^(hi|hello|hey|sup|yo)\b/.test(q)) {
    streamingReply("Hey! Ask me anything — geometry proofs, arithmetic, algebra, logs, calculus concepts, and more. Try \"1 + 1\", \"how do parabolas work\", or \"Circumcenter Theorem\".");
    return;
  }

  // Help
  if (/^(help|what can you do|what do you know)\b/.test(q)) {
    appendMsg('assistant', buildWelcomeCard());
    return;
  }

  // Browse geometry
  if (/\b(list|browse|show all|every theorem|all theorems|all postulates)\b/.test(q)) {
    appendMsg('assistant', '<p>Here are all the theorems and postulates from your proof book:</p>' + buildBrowser());
    return;
  }

  // ── 1. If query is purely about a math concept, skip geometry entirely ──
  if (isMathOnlyQuery(q)) {
    const conceptResult = MathBrain.findConcept(query);
    if (conceptResult) {
      const intro = `Here's how ${conceptResult.concept.title} works:`;
      const msgEl = appendMsg('assistant', '<p></p>');
      const pEl = msgEl.querySelector('p');
      streamText(pEl, intro, () => {
        const cardEl = document.createElement('div');
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'translateY(8px)';
        cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        cardEl.innerHTML = MathBrain.buildConceptCard(conceptResult.concept);
        msgEl.querySelector('.msg-body').appendChild(cardEl);
        scrollThread();
        requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
      });
      return;
    }
  }

  // ── 2. Try arithmetic computation ────────────────────
  const computed = MathBrain.tryCompute(query);
  if (computed) {
    const intro = `Let me work that out:`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(6px)';
      cardEl.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      cardEl.innerHTML = MathBrain.buildArithmeticCard(computed.expr, computed.result);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 2. Try geometry proof search ─────────────────────
  const proofResult = searchProofs(query);
  const fmt = currentFormat;

  if (proofResult.best && proofResult.score >= 40) {
    const intro = `Here's the ${proofResult.best.title} (${proofResult.best.number}):`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      cardEl.innerHTML = renderProofCard(proofResult.best, fmt);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 4. Try math concept search (fallback for non-geometry queries) ──
  const conceptResult = MathBrain.findConcept(query);
  if (conceptResult) {
    const intro = `Here's how ${conceptResult.concept.title} works:`;
    const msgEl = appendMsg('assistant', '<p></p>');
    const pEl = msgEl.querySelector('p');
    streamText(pEl, intro, () => {
      const cardEl = document.createElement('div');
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'translateY(8px)';
      cardEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      cardEl.innerHTML = MathBrain.buildConceptCard(conceptResult.concept);
      msgEl.querySelector('.msg-body').appendChild(cardEl);
      scrollThread();
      requestAnimationFrame(() => { cardEl.style.opacity = '1'; cardEl.style.transform = 'translateY(0)'; scrollThread(); });
    });
    return;
  }

  // ── 4. Fuzzy geometry match ───────────────────────────
  if (proofResult.best && proofResult.score >= 15) {
    const alts = proofResult.all.slice(1, 4).map(r =>
      `<button class="hint-chip" onclick="quickSend('${r.proof.title.replace(/'/g, "\\'")}')">
        ${escHtml(r.proof.title)}
      </button>`
    ).join('');
    const html = `
      <div class="fuzzy-banner">⚠️ Closest match — may not be exact.
        <div class="alts-row">${alts}</div>
      </div>
      ${renderProofCard(proofResult.best, fmt)}`;
    appendMsg('assistant', html);
    return;
  }

  // ── 5. Not found ──────────────────────────────────────
  const html = `<p>I'm not sure about "<strong>${escHtml(query)}</strong>" — try rephrasing, or explore what I know:</p>
    <div class="welcome-chips" style="margin-top:12px;">
      <button class="hint-chip" onclick="quickSend('how do parabolas work')">Parabolas</button>
      <button class="hint-chip" onclick="quickSend('what are derivatives')">Derivatives</button>
      <button class="hint-chip" onclick="quickSend('how does log work')">Logarithms</button>
      <button class="hint-chip" onclick="quickSend('2 + 2 * 10')">Try arithmetic</button>
      <button class="hint-chip" onclick="quickSend('list all')">Geometry proofs →</button>
    </div>`;
  appendMsg('assistant', html);
}

// ── Browse all ────────────────────────────────────────
function buildBrowser() {
  const chapters = {
    'Foundational Postulates': p => p.number.startsWith('P'),
    'Chapter 6 · Triangle Theorems': p => p.number.startsWith('6'),
    'Chapter 7 · Polygons & Parallelograms': p => p.number.startsWith('7'),
    'Chapter 8 · Similarity': p => p.number.startsWith('8'),
    'Chapter 10 · Circle Theorems': p => p.number.startsWith('10'),
  };

  let html = '<div class="theorem-browser">';
  for (const [label, filter] of Object.entries(chapters)) {

    if (!items.length) continue;
    html += `<div class="chapter-group">
      <div class="chapter-label">${label}</div>
      <div class="chapter-chips">

          `<button class="theorem-chip" onclick="quickSend('${p.title.replace(/'/g, "\\'")}')">

          </button>`
        ).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

      <button class="hint-chip" onclick="quickSend('what are integrals')">Integrals</button>
      <button class="hint-chip" onclick="quickSend('quadratic formula')">Quadratic formula</button>
      <button class="hint-chip" onclick="quickSend('how does probability work')">Probability</button>
      <button class="hint-chip" onclick="quickSend('Circumcenter Theorem')">Circumcenter</button>
      <button class="hint-chip" onclick="quickSend('Inscribed right angle')">Inscribed 90°</button>
      <button class="hint-chip" onclick="quickSend('list all')">All ${total} geometry proofs →</button>
    </div>
  </div>`;
}

// ── Sidebar proof index ───────────────────────────────
function buildSidebarIndex() {
  const container = document.getElementById('proofIndex');
  if (!container) return;

  const chapters = {
    'Postulates': p => p.number.startsWith('P'),
    'Ch. 6 — Triangles': p => p.number.startsWith('6'),
    'Ch. 7 — Polygons': p => p.number.startsWith('7'),
    'Ch. 8 — Similarity': p => p.number.startsWith('8'),
    'Ch. 10 — Circles': p => p.number.startsWith('10'),
  };

  let html = '';
  for (const [label, filter] of Object.entries(chapters)) {
    const items = PROOF_LIBRARY.filter(filter);
    if (!items.length) continue;
    html += `<div class="idx-group-label">${label}</div>`;
    html += items.map(p =>
      `<button class="idx-item" onclick="quickSend('${p.title.replace(/'/g, "\\'")}')">
        <span class="num">${p.number}</span>${escHtml(p.title)}
      </button>`
    ).join('');
  }
  container.innerHTML = html;
}

// ── Auto-resize textarea ──────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const isBuilder = document.querySelector('.builder-wrap') !== null;

  // Format toggle
  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.fmt;
    });
  });

  // Mobile hamburger
  const hb = document.getElementById('hamburger');
  const sb = document.getElementById('sidebar');
  if (hb && sb) {
    hb.addEventListener('click', () => sb.classList.toggle('open'));
    // Close sidebar on outside click
    document.addEventListener('click', e => {
      if (sb.classList.contains('open') && !sb.contains(e.target) && e.target !== hb) {
        sb.classList.remove('open');
      }
    });
  }

  if (!isBuilder) {
    // Chat page
    buildSidebarIndex();

    const sendBtn = document.getElementById('sendBtn');
    const input = document.getElementById('input');
    const newChatBtn = document.getElementById('newChatBtn');

    if (sendBtn) sendBtn.addEventListener('click', handleSend);
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      input.addEventListener('input', () => autoResize(input));
    }
    if (newChatBtn) {
      newChatBtn.addEventListener('click', () => {
        const ti = document.getElementById('threadInner');
        if (ti) ti.innerHTML = '';
        showWelcome();
      });
    }

    showWelcome();
  }
});

// ── Show welcome (chat page) ──────────────────────────
function showWelcome() {
  appendMsg('assistant', buildWelcomeCard(), false);
}

</script>
</body>
</html>
